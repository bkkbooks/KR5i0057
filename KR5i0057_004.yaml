front:
  text: 東園語録重刋道藏輯要東園語録
  hash: sha256:911f3dd7a937b67ae0e06fddf539c8ae4f10a31b0d711d24fd40e6d416f41693
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-KZ_KR5i0057_04p001a}
body:
  text: 平雲堂真如居士崇德堂衆姓捐資敬刋士子讀聖賢書先須明善惡兩途既明善惡於事之善者不獨嗜好之珍寶之必當身體而力行之庶幾事事歸於至善矣於事之惡者不獨深惡之痛絶之必當根拔而株鋤之庶幾事事不流於惡矣然近時之人善心少而惡念多要必日置數卷勸善懲惡之書使之隨時觀玩隨時體貼引而伸之觸類而長之自不知善心何以勃發惡念何以濳消待至久久遵行與書合一則有善念而無惡心然後嘆善書之有關於世道人心者大知此則可以知吾命刻東園語録之意也夫士子讀書明理於本原處固知敦篤然每忽於細微而失其孝者一言少有不謹一事少有不愼未嘗不貽親以不安處此所謂小不順者未始非謂之不孝也必於門內一言一動凜凜焉覺易犯易觸躬常自責腹不少誹親喜亦喜親憂亦憂親所愛與俱愛親所惡與俱惡一切輕浮躁慢驕矜滿假之念不形於親親有所命則速應之即親無所命亦當先意承志曲會親心而代勞作之子之子女是親血脈所貫注若於親前怒詈刻責皆非孝也工役奴僕親未厭惡若於親所動加罵唾亦非孝也推之待人不以禮處己不以恭御妻妾不以義更不得謂之孝惜財帛而少善緣重身家而少施濟更不得謂之孝恃才華而輕禮節交綺士而失品行更不得謂之孝親在則跬步不離親歿則追思莫釋極之時過境遷至數十年之久親之面貌聲音猶在子耳目之中則孝思不匱方成得一箇人子諸生勉乎哉人之生也靜則以心為根動則以心為宰心之在人如日月之麗於天照耀不蔽如江河之導於地貫注不絶有依為生死而已者也乃人往往將此一點靈光敗壞不惜無惑乎招愆積咎纍業千般必待滅亡其身而後已是果誰主之使然歟吾今為世人説心夫心者方之於物精也又仁也精喪則枯仁壞則稿未有能久者也不若將此心還其本然不偏不倚不顚不倒不反不背安之中正之為得心不可私而宜公心不可曲而宜直心不可薄而宜厚心不可忍而宜慈心不可昧而宜明心不可姦而宜良心不可惡而宜善心不可邪而宜正心不可暴而宜和心不可偽而宜真心不可險而宜夷心不可高而宜下心不可傲而宜平心不可驕而宜謙心不可肆而宜敬心不可放而宜斂可以質天帝可以對鬼神可以盟幽獨坥坥然無偏而無黨瑩瑩然弗蔽而弗昏則心源已淸流達於日用應接之間未有濁而污及其身者也至若機械之心計較之心殘刻之心嶮巇之心禍害之心蛇蝎之心虎狼之心誑騙之心欺淩之心忤慢之心坑陷之心淫邪之心鄙吝之心利己損人之心剝人肥家之心種種非心既發而不可阻遏其傷人實多而其速敗己身也實甚人又何可不保其初心而任役於後起之心也哉心曰田則寸壤可耕心曰地則寸土可種將欲貽子孫以福澤富貴乎還求之固有之心可也人若能創其不可告人之心懲其不可對己之心守己心以合天心滌俗心以學聖心吾且頌之曰心福威儀之學後儒多不講究意以為不必講也不知此身成於天地父母至重至貴置其身於禮法之外必棄其身於兩大之中何也莊敬日強妄肆日偷聖狂之機在此分別未可苟焉而已也晰禮一書載威儀詳且晰如耳目手足行動止息皆有威儀以束之束其身所以定其命也世有迂謹之士以拘牽為威儀曠達之流以灑落為威儀襲取之徒又以粉飾為威儀皆不得其威儀者也有威可畏謂之威有儀可象謂之儀流於自然威儀為我用出於勉強我不為威儀用也必於平日涵養其性和順其心斂其縱肆化其驕矜養其純熟然後動容周旋中禮積中先有一段流行自在之趣發外自有一段從容不迫之情一言笑也有和光之度一拜跪也有誠慤之容一立也如山一坐也如尸一趨也如舒翼一步也如循規對尊長而肅然敬值年少而藹然親遇倉卒而處之恬然逢憂虞而安之泰然當欣喜而受之適然此之謂威儀此之謂敬身敬身之謂孝此之謂威儀此之謂立品立品之謂學蓋未可苟焉而已也若孔子燕居申申天天此是神化境趣則又不能驟期也人身眼耳與鼻皆主於納惟口舌則獨主於出言是也如泉之始達少不堤而防之則泛濫而無所底止出言固如是也夫所以舌之外以齒為之城以唇為之郭以髭鬚為之林木以圍護蓋防之嚴堵之密也昔者吾於蜀南眉水之旁作戒口孽文傳之久而播之遠諸子諒見而讀之矣夫復何言然諸子固知戒淫褻之言尖酸之言機鋒之言敗名喪節之言害世亂俗之言瀆聖慢神之言而未盡戒者尚不一而足吾今再為諸子細推之如出一粗暴語出一詈罵語出一高大語出一狂妄語出一鄙俗語出一刻薄語出一詭誕語出一氣忿語出一怨尤語皆謂之口過不特此也對父母有一隔膜語對弟兄有一疏遠語對子孫有一放肆語對妻妾有一私狎語對朋友有一支吾語對老成有一傲慢語對年少有一誇大語對親鄰有一矜飾語對富貴有一迎合語對貧賤有一輕忽語對奴僕有一苛責語對殘廢有一訕笑語亦謂之口過至於擬議陰晴怨咨雨雪望水隔而長嗟逢歧路而歎息亦謂之口過諷神佛之不靈誚官府之不亷譏朝政之不善亦謂之口過借古人以作謎竊古書以行令述謠語以惑人亦謂之口過種種易犯失於檢點者多矣不知犯造物之忌干鬼神之怒問名不遂求利無成潦倒終身冷落窮巷子孫愚蠢後嗣益衰者皆此口過貽之咎也諸生可不愼於微哉可不愼於微哉果能捫其舌緘其口談鋒自戢醇厚居心庶幾勉於無過矣天下之可嘉可敬者惟節烈天下之可憫可憐者亦惟節烈彼其人賦天地之正氣指可以斷髮可以翦頭可以截惟此從一無二之志不可以隨流逐波而或存或亡靑年遽失所天此志堅於金石所可痛者天地為之厄其遇鬼神為之變其遭以磨礪其人之堅貞於永固此其中蓋亦多故矣在富者猶有僕從可呼在貧者則井臼自任在少時已傷進退之維谷在中歲亦悲形影之雕殘在有子者尚幸本支之未隊在乏嗣者永歎承繼之無人夜照寒燈淒涼何訴晝扄孤闥苦况難言加以族黨橫豪親鄰逼勒周旋無計處置愈難每當負屈含寃自願捐軀殞命或投繯以誓志或赴水以全操嗟乎此節婦之苦境也屬在親誼與夫鄰舍理宜顧惜曲意成全當首身而舉報宜採擇以維風彚輯多名幽光代闡恭遇恩典捐金以助或於城廂或於市鎮建石標名永垂奕祀則天地鑒其善全鬼神欽其義舉彼婦之家光榮三代生者如得進身之階沒者永感黃泉之府庶幾不愧吾輩之作善也夫人子求地是安親的意思求之過遠則親轉多不安譬之在生親一日不見其子則倚門矣更倚閭矣歿後置親於數十里或數百里外為子者又不能經年纍月在其側親其安乎即有吉穴葬後即發富發科而此時之子孫轉不似從前矣富者驕其富而服飾飲食遊佚邪蕩之不暇何嘗念及親墓一憑弔乎貴者出仕他鄉有遷籍者有宦遊者有慕進不已樂而忘返者又何暇念及親墓一歸掃乎漸至愈棄愈荒強鄰竊𢭔等弊殊難枚舉親其安乎不若就近採擇只要不受風水泥蟲即是佳壤且四時祭掃便於顧照親在九京焉有不樂者語云吉地憑心地有一人自有一地天不能倒行逆施以地𢌿人也此理識之且天之生財祇有此數其待恆河沙數人恆河沙數家之取給者亦祇有此數惜之則囊橐不匱耗之則用度終虛理固如斯節儉宜尚嘗見有祖若父辛勤而子與孫簡約始焉淡泊繼漸嬴餘而仰事俯畜既鮮焦勞春禴秋嘗亦足供用終歲未嘗告竭於人一生惟慶豐亨於已苟恃心與奢心並生淫志與驕志共起所入雖多而所出益倍不觀夫侈靡之家乎坐擁厚資驕奢日起一飯則羅列珍殽一衣則飾誇錦繡屋宇而畫棟雕梁僕從而前呼後應馬皆食粟車亦飾珠賓客盈庭歡呼暢飮親朋援勢借粟那金子弟亦習浮華妻妾更多粉飾所謂揮金玉而如土者恬不知大厦之將傾也及至家資罄盡門巷蕭然車馬無音賓朋裹足欲言貸而人先告艱難甫有求而彼反多譏誚雖親如骨肉究鮮矜憐即好如妻孥每來訕怨更有生平知己值首尾之牽纏竟唾詈而不顧往日僕童當門戶之雕敗亦逃避而之他即或仗義有故人通財多舊識而受人憐惜益增己羞慙嗚呼境至如斯回憶曩時真堪令人痛哭也豈非不節不儉階之厲乎倘當豐豫之時早生困窮之慮質朴無文節省有法又何至不克守其成而鮮能創其業哉所願酒食遊戲不縻費於生平喪祭冠婚不逞豪於當事識人情之冷暖守謹厚之家風不惟本身長享安樂之天亦且子孫永受無窮之福矣然獨於父母之奉善功之用則又不可一例而論九疇五福首列以夀夀大福也人人爭羡之人人爭致之爭致之而又恐弗獲於是圖謀益力冀幸頻生吾見設譙謝念彌陀有禳禱以祈夀者矣殺雞豚羅滫瀡有頤養以延夀者矣覔參苓市淮朮有補濟以圖夀者矣甚有購千載之首烏鍊金石之大藥以益夀者矣甚有採戰借補傷風亂俗以希夀者矣種種悖謬狂惑天將奪其魄而使之速喪尚何夀之足云且夫夀者數也數不可知也夀者命也命不可憑也凶夭短折在天自有一定之權衡而老大長年在己貴有轉移之功行特人只知問夀之年而不知問夀之理與德耳理操於制勝而造物亦無權與其求諸不可知之數不若求諸可知之理也德抱乎有餘而天心自可挽與其卜諸不可憑之命不若卜諸可憑之德也彼天之生物與生人心殊無二致人能體好生之意不事戕賊不起叨餮相與共安於太和之宇則好生即自生之理也葆其真固淡其嗜欲姦聲亂色之不留淫樂慝禮之不接則精聚者夀自長神足者夀自永矣此得夀之理所謂仁者夀是也至若施濟困苦周恤孤貧設粥救荒捐金帳老育嬰養疾諸大端行之不吝則遐齡自增所謂大德得夀者是也本此以求夀不獨夀一已且上而夀父母矣下而夀子孫矣舍此以求夀天必不能如願而償徒增干瀆之罪耳曷弗觀古今之享大年如竇裴范袁諸人其始本不夀而具夀之德操夀之理卒至挽天心於已定人如欲夀乎追蹤諸子可也天地一大包涵也其麗於天麗於地者更藴蓄之不盡也日月也風雲也雷電也時而昏暗也愁慘也怒號也變也不逾時而朗耀也和淡也寂靜也當春夏而仁也當秋冬而殺也皆行乎其所不得不行止乎其所不得不止也無容心也泰山之於邱垤也河海之於行潦也苖莠之不齊也人物之互處也耜梓樗樞之交植也靜觀之而高下懸殊也淸濁異流也苖仍植而莠必鋤也人仍靈而物居然蠢也耜梓材而樗樞終棄物也并乎其所不得不并別乎其所不得不別也無容心也人處其中戴高也履厚也度量當上法天也下則地也度量之含宏也無能狀也無能度也洋洋乎若千頃之波也接人則光風也霽月也坦坦然無嶮巇之情也持己則莊也嚴也忠也恕也油油然易直子諒之心因之而發見也喜怒之不形也哀樂之有節也中和也妍媸之胥化也瑕瑜之悉忘也渾淪也如是人望之而莫狀其春容也即之而莫測其淵涵也可以養身也可以延夀也可以膺福也度量之狹小也貪也嗔也癡也怨也多煩惱也多冀幸也皇皇然終日終夜而靡寧也可順而不可逆也可常而不可變也可富而不可貧也可榮而不可辱也處己氣易動也性易躁也不能忍人之所不能忍也處人多遷怒也多宿怨也不能容人之所不能容也偏也僻也傲也慢也幾幾乎不與世而共立也其實私欲也刻薄也損人也病世也不足以保身延夀而履福也度量之相越也辨之宜早辨也化其褊小而崇乎光大也斯與天地同其體合其德也人當成婚後每以得子為望苟得子則幸曰我有子矣我免不孝名矣不知有子固免不孝名有子究不即免不孝名有子象賢則已有子不肖則不如無子之為愈也祖若父遺我以産業門第我不能使我子孫守此産業門第雖未嘗斬絶宗嗣而弗克繼續家聲有子如此又何樂而有是子哉蓋義方之教不容緩也間嘗觀古今人情見有縉紳之裔人人羡之曰此鸞鶴之姿也不數十年而浪蕩無底止矣田舍之子人人輕之曰此草茅之賤也不數十年發達而不可阻遏矣是何故歟夫亦教不教之所由致也然教子有二以言教以身教言教則朝夕勤懇教以孝弟忠信教以禮義亷恥教以恭敬慈讓教以惻忍羞惡教以勤謹儉約及教以善惡果報出就外傳則又教以尊師重道使之學有造就斯其子耳聞日熟端士日親自趨向正而材可成矣身教為之父者一言不可苟一行不可虧一事不可錯即心曲中不可懷私而蒙垢品正行端可模可範其子目覩既久自然亦步亦趨舍此則別無他道也顧世有非不教其子而終不能教成者其弊又失於過寬與失於過嚴過寬者輕言低語似恐觸忌溺愛情私怒厲不作有所指説能聽隨之弗聽隨之彼其子恃親之慈仁而弗敬畏驕縱日滋此教不成之弊一也否則動加以唾詈或加以捶楚加以鎖閉加以追逐加以飢寒在己以為刻責嚴斯率循謹不知天性之恩反成仇敵有父愈刻而子愈忤者此教不成之弊二也不若相子而施謹厚者以剛克愚悍者以柔克剛克所以鼓舞其志柔克所以濳化其偏譬之駒犢不事繩韁放縱而性難馴苟束縛其身又加鞭撻則又性驁而觸欄逝矣教子者顧可忽乎哉吾於窠山之陽見一蒼老縊將絶命吾解而蘇之問彼何為蒼老曰吾世家裔也門楣不弱家亦中富生二子一朴一頑頑者吾刻責之甚嚴防制之甚密益成寃懟日與羣小人酒食遊戲相徵逐淫色賭博無所不至家破半吾猶幸尚有朴者可守半也乃平日因朴而疏於教誨朴者無他能一切家事世事毫不分得惟噉飯而已不十年又將半業破去及今頑子蹤迹無耗朴子束手飢餓吾亦屢空不能挨此苦况又不足以對先人於地下故求盡耳吾聞言知此老之不得教子方者因為之歎息而作此以醒世云人之可以為豪傑可以為卿相可以為聖賢可以為佛仙沖霄漢而壯河山者其惟此志乎志者忠孝節義所由著人品學術所由成志之不可不立也有如是夫志以帥氣氣餒則志不伸志以行義違義則志不達在昔孔子志切東周而陳蔡之厄所不顧孟子志在仁義而好辨之譏所弗辭何其志之奢且遠也後世如班子之志封侯范子之志宰治莊子之志虛無朱程等之志道學嚴蜀莊之志龜卜皆一一履其境而償其願何其志之堅且確也人若志惰則一事無成南人有言曰人而無恆不可以作巫醫人若志昏則一生無望孔子曰朽木不可雕糞土之牆不可杇人若志紛則一物不如孟子曰苟為不熟不如荑稗志之不可不立也有如是夫且夫人一持其志雖鄙夫婦孺鬼神所不得而忌天地所不得而奪一隳其志即英豪傑士與瓦缶同毁共草木齊枯是人成於有志而敗於無志也間嘗觀田夫牧豎尚志桑麻瓜果種植以收其利牛糞馬渤蓄積以待其需其志雖微而未始非志較之儼然七類而無一志願者其有靦面目實甚也讀烈士暮年壯心不已之詩未嘗不歎一息尚存此志不容少懈而壇下有數輩竟悠忽自處碌碌無所短長乎聖門中如樊遲志日卑下請為農圃夫子尚責以小人彼無一志可告父母而對蒼天者即欲自居於小人又將不可得矣自茲以往尚其急思變志哉讀書人大半食館者多此係關乎陰隲不可以不愼吾見有久為人師而終身落寞者皆緣於不盡厥職故也教子弟有三層童蒙則先教之以行坐端正衣冠整齊言語收斂與夫拜跪進退等事溫凊敬讓謹信等端然後授之以書隨讀隨講務淺近其説使之易聽稍長至成人之列人禽之界在此一時則又與講明人品心術功過因果以正其趨五經四子書不徒誦其文務令嚼其義力防匪僻時親賢士則心不馳而身亦不玷矣繼此又與之究克己復禮之功天人性命之學明德新民止至善之理則真學也而真儒出矣今之為師者則不然童蒙入孰終日苦以咿唔以了其課餘無一善策啓其良固其根成人之列徒責以文章詩古字學諸端以為梯榮取科之計問經學則不知問理學則不解遑問其他哉不知陶成無術誤人終身其罪非淺斯人也後嗣愚魯門第衰微蓋亦天報彼之不稱其職也諸子均居西席吾故及此尚其識之在壇人衆半屬生理抑知生理之義乎生者生機勃發如樹之有枝而有葉也而又於生字下著一理字理猶根也根固則枝葉愈榮行商坐賈固屬將本以求利而一分之利暗寓十分之害故術不可不愼也然執是説也利將不可問乎非也於分內之利取之分外之利則莫貪也於自然之利取之勉強之利則莫求也寧利微也無使利大寧利短也無使利長利微也而我儉用之則微也而如大矣利短也而我節費之則短也而如長矣且人生之富貴無常而在己之精神宜惜若徒逐日揣摩謀獲人人之利以肥己吾恐己未肥而心先枯矣生理者知之謀足衣食而已何多求焉士生不偶有數朝而生數士有一朝而生數十士有數家而生一士有一家而生數士蓋必由天地誕降之奇山川鍾育之盛祖宗積纍之厚君國需求之殷然後士始應候而出士有士之學學則天德之學士有士之才才則王佐之才士有士之器器則瑚璉之器士有士之識識則廣博之識所以士未出而草廬嘯歌士一出而蒼生待命士之為士誠重矣哉自古如八元八愷及周之八士百男固稱極盛由春秋而遞及各代往往有非常之士名震當時勳垂後世者指不勝屈考其持身行事大都有裨于學術有功于名教有補于國家有利于民生非若沽名弋譽空疏無本者也今之為士者則不然稟天地之靈得山川之秀承祖宗之澤而無實際以酬君國之用論學則自謂學貫天人論才則自詡才傾元白稍擅雕蟲即以為攀龍附鳳之具目空一世倨傲千般風流自誇輕薄殊甚不必究其繼也即此飛揚浮躁之習已負天地山川祖宗君國之心矣獨不思士者民之首為真士不為偽士然後士品端為誠士不為華士然後士風正為道德之士不為曠達之士然後士習醇昔諸葛布衣而草廬三顧文正秀才而天下已任此何等士而顧不為特出之士而為盜名之士乎其在詩曰濟濟多士克廣德心又曰濟濟多士文王以寧則士之稱誠不易多士之代誠難數覯也吾願為士者仰體天地山川祖宗君國之心以克副天地山川祖宗君國之望庶多士之篇可再作於今日父在斯為子兄在斯為弟子弟者去日尚少來日方長而一生之成敗實基于此何也子弟必有個執業身為業束則身有依據若無所事事有日流于放蕩而不覺矣蓋士農工商盡人事也不士不農不工不商則為遊惰之民古者有禁凡遊惰者殺無赦則知遊惰之大不可也然執業固重而守業尤貴專或有始無終或見異思遷究與無業者等其何以安生計而慰父兄乎為子弟者其思之凡人之生生於心心善則百脈流暢心惡則羣體憔悴不見夫樹之有枝葉乎樹有枝葉固是人事栽培雨露滋養而生機暢達實本乎心縱加之以斧斤踐之以牛羊只要不傷其心仍無恙也苟傷其心立見乾枯耳子弟之心蓋可戕賊乎哉近時風氣不古一切勾引日盛月熾以酒戕者有之以色戕者有之以賭戕者有之以煙戕者有之更有以爭鬬戕以奢侈戕以飮食戕種種戕心難以枚舉甚者心懷鬼蜮心存刻薄心長驕傲心滋放肆心挾毒害如是等心以心賊心子弟之面目猶是也而氣魄已奪之矣惟上不欺天下不欺地中不欺人自然心坦氣和心朗神生為子弟者其思之心正矣品更宜端六尺之軀偹五行之秀不端其品辱父兄矣端品者不失足於人不失色於人不失口於人當於非禮勿視聽言動以絶其妨害然後出入有常舉止有則兼以不尚艷服不著邪履不談閨閫不履邪徑不進歌樓舞館不坐茶亭酒肆與老成遊與道德近與姦邪遠與便佞疏自爾端人可擬否則失品為子弟者其再思之至於銀錢雖屬人生不可少之物而採取姦利每貽父兄以惡名若一味貪圖殊不足以對我父兄莫謂弗得即得必失也且子弟正屬有為而利欲薰心卻損無限福澤愼之愼之父兄有善繼之恐其不增父兄有惡諱之恐其不盡父兄有欲思滿之父兄有憂思釋之為父兄之愛子弟勿為父兄之怨子弟兄弟間或二三人或四五人勿起私積勿聽枕言勿傷天倫作一箇田氏荆花薑家大被方是如手如足的真處轉眼簷滴則效依然綿遠有慶矣為子弟者其更思之修士好言仁謂仁為性之根情之蒂在天為生成在地為長養無一處不是仁之布濩無一刻不是仁之流行人而不仁不可為也不知仁之精髓須從心之德愛之理二語勘出然此二語學者每滑口讀過不深思其何以為心之德何以為愛之理遂使至當之仁説不真切而淺識者更推之愈遠而愈失矣蓋仁有體有用心之德體也愛之理由體而達於用也仁不根乎德則仁為虛器仁不發於愛則仁為死物以心之德求仁仁在是以愛之理言仁仁在是然心之德人人解得只愛之理一句又起後世許多弊病吾見有以姑息為愛者矣有以私欲為愛者矣有以偏僻為愛者矣有以容忍為愛者矣凡此皆錯認愛字即錯認仁字仁固愛不兼愛不偏愛不犢愛仁以如量而止如從井救人則逾量矣仁以見境而起推及無窮則逾境矣且仁存惻忍有惻忍所及所不及處必無所不及仁不如是之騖遠仁好施濟有施濟所到所不到處必無所不到仁不如是之馳思總之仁率自然不出勉強人能辨之庶仁不至流于虛偽而為假仁者所襲取誠意之學是初手工夫亦最細工夫自來道學之士無一不從誠意做起然意之誠與未誠無人見得惟自知覺傳言毋自欺必求慊是為誠意下切實工夫果能不欺求慊意未有不誠者若徒靜坐一室口不與人交目不與物接終日沈思默守以為意之誠如是而止而心猿百變不知幾經奔馳於千里外矣意究何誠此之謂自欺此之謂未慊蓋誠意惟在愼獨十目視十手指獨中之嚴嚴于廣衆則意無不誠彼世之以靜坐為誠以閉目為誠並不于意之起發截然阻其私引于善終是浮淺不精切之功與小人掩著之偽一流人物何能步先賢大儒後程耶人無二性性無二理人之有性如天地之得一也無二性何人之仁義禮智性始然也既有仁義禮智推之則忠孝亷節等端皆性中流出并未嘗強之如此而終不得不如此此以知性之根生於無形發於有為一人一性也人人共此一性也即物物共此一性也今謂惻隱羞惡是非恭敬性有存有不存則大謬之極惻隱羞惡是非恭敬並非出於人為乃發於自性其鮮惻隱羞惡是非恭敬者有後起以蔽之耳不于未發徵性而以後起泥性無惑乎性日漓而日牿也性之賦於天命者中和也徵之人為則忠恕也人無中和則非天命之實人無忠恕則真後起之私世人不察轉多難之何故即如一人于此始焉慈忍一心繼焉刻薄一心其始之慈忍乃虛靈不昧處繼之刻薄乃私欲蒙蔽處究竟不得以刻薄而沒其慈忍也自左道多而正教少將這個性字講壞殊不明性之理並害乎性之實矣孟子曰人無有不善此一句則足以破古今之異説純陽子為天下之醫王以能起死回生故也善醫病莫先於善用藥吾見天下蒼生皆抱沉疴而不得其藥因發慈悲心下塵世而救之使疾瘳而體舒泰用藥八大味可人人服之一孝一弟一忠一信一仁一義一亷一恥而其中更有大補於人者又一善服此上八味則疾瘳長服下一味則疾愈瘳吾之言非誑汝輩也當今之世忠孝等事實盡者有幾人為善一途樂從者有幾輩是徒知愼風寒之疾而不知有心腹之病也蓋天道惡盈而好謙人不體天德以持身持心持家故天惡之雖有萬金立見消滅雖極烜赫立見消亡本身既有餘辜後嗣亦多殃及自此魔障叢生災星疊見天特使之除盈以益困除貴以益賤也為今之計急服吾八藥使五倫五常振新急服吾善藥使鰥寡孤獨及昆蟲魚鱉禽鳥等類均受其利愚頑蠢鈍姦貪詐誣等人均受其化有家者出錢無資者出心出力庶心腹之痛可療而子孫亦獲夀命矣試看今日此藥需否純陽子一傾耳之餘不禁慨然矣今天下之庸庸者何多也本不識不知之倫而妄議朝家之事不辨真偽道聽塗説以為某某忠某某姦某某進某某退某某賞某某戮某地陷某處危某城下某府傾言之而聽者弗察遂以為真相率而傳於里巷播於城鄉始焉猶少諱之繼焉則無忌憚徒搖動夫人心蠱惑乎士女此誠今日之大不美者也獨不思我君何人我朝何代而不存一憂國之心存一回天之想相與晨昏潔誠焚香默叩求保世宇淸平國家安靖徒藉遠信之似是而非者津津樂道是亦愚之極者也當此之時甚賴有識之士出而正之聞彼言則開導之曰是不宜出此不祥語也是不宜形諸口舌以惶惑人民也人民惶惑則世不治矣世不治則爾亦莫保矣且爾何人敢言朝廷事獨不慮官府聞之而罪爾乎示已又轉勸曰爾無憂今天道顯明風則調矣雨則時矣日月則未嘗食矣五穀則未嘗歉矣正我皇上有道之徵人民太平之象夫何憂哉由是而謠言息惶惑止世宙寧矣尤責在宣講者以奉事父母比爾等作善事父母必待父母要吃才進吃要穿才進穿孝極薄矣要吃而少進吃要穿而少進穿孝又極薄矣當要先意承志父母未飢恐已飢先進食未寒恐已寒先進衣方稱得一個孝字今爾等為善吾題及而始從善已薄矣吾題及而猶不盡從善更薄矣將何以答天地而格仙佛乎必不待題及而自從且樂從且毫不有所希冀而從則真心樂善不求天地仙佛天地仙佛自然無微不照無感不靈爾等試回想一番有此真念否吾見有一粟米之善而冀幸頻生少不如願沮怨之私頓起者多矣凡人不可存獲報之心亦不可存冀幸之心我生當作當為之事我作為之乃是分內事即如有親當孝我孝之無他圖也有兄當敬我敬之無他圖也圖則孝敬從有所為而起并非從血性中流溢出來為善亦何獨不然人之初生性本至善我今日為善乃我天性未漓天良未汩以此還其最初之本然無事勉強無事艱難無事圖其報應如少有一毫圖報之念則善根先不真切不穩固報則善猶有餘蘖不報則善并無根蒂矣吾故曰不存獲報之心也人每以冀幸為心謂我日奉仙佛仙佛必如我之所求如問病問夀問家宅問墳地問名利等端靡不求於仙佛之前此即冀幸心也不知問仙問佛不如問之自身所為自心所向耳問得過身心天神佑之仙佛保之吉神隨之惡星避之隨時隨地無不如意如以杯水來即欲易河流返烏有此易易事哉勸爾等把這兩樣心腸逐去一心皈命至誠無欺善念日堅私情胥化則大報至矣人家戶口或病符纏擾或官非口舌或橫禍奇災皆係本身應受之厄今生應受之報及前人貽下之孽必待愆尤消釋餘殃盡淨然後解免否則妄千仙佛徒增益其罪耳故有不求仙佛而仙佛尋救者其人之修德行善感之也有求仙佛而仙佛不之救者其人之立心制行不問而可知矣欲彌災咎無須禱禳還當自責諸己心惑之為害大矣哉自古英雄豪傑非不慷慨立功立德而一朝迷惑較婦孺而不若卒至敗名喪節不可挽回至於庸愚不待言矣惑之為害大矣哉而其所以受惑者由見理不明以人言為是非耳夫見理明者中有主持百折不回即指可截髮可斷而欲行其所行之志必不可易今日之事固理之至可明而勢之無可疑者也聖賢著書立説為天下後世計較著彰明無可議者仙佛演典傳經亦為天下後世計豈有可疑乎吾由儒入道所言皆聖賢之言而世人不察動云鸞降大干法令獨不思如果干法吾豈故為此以害人哉在昔毗陵等處以言救世有惑之者吾愈解之而人惑如故他如齊雲等壇亦然嗚呼人心之不明今古同轍也昔子張問辨惑孔子曰知者不惑聖賢皆以去惑為教蓋念天下人之惑者衆矣然則何以解之以理與勢解之而已見理明則惑自解揣時勢則惑亦解吾願爾等以今日之事而自審之自度之可也夫何惑吾抱婆心下遊塵世不一代矣向人即教以善無非望人同歸於善也而勸善實難有聽吾教而不入善者有聽吾教而向善不固者此等人吾欲絶之吾又不忍遽絶之再三叮嚀以期終底於善而後止而人任其千言萬語卒不感發其天良吾其奈之何哉即有好善之士方一念向善即一念思報此有所圖而為善者非真向善人也向善必如死呆一般一善為百善為千萬善亦為不知為善之有果報只憾為善之有遺漏此方是真心樂善吾惜不多逢今爾輩如果堅於為善吾最重之不負吾屢來斯土也回道人抱一腔惻忍逢人即訓誨雖親之於子兄之於弟師之於門人不過如是吾豈好為論説哉春秋以降遞及軻老厯數百年而朱程等大儒出教化又復振興以後間有真儒垂言救世至於茲而教化幾滅斯民秉彜之德往往不復致使世日卑下風氣無復有古遺意焉吾以慈悲心志孔孟諸儒之志為天下振其聾發其瞶吾之心亦幾瘁矣吾之言亦幾窮矣前載乘鶴間遊偶遇陶子復等誠心叩懇吾於雲端感其真意因駐於茲以救蜀西之蒼生赤子所言并不涉於誕妄忠孝等事之言也吾又何嘗有負於斯人哉乃斯人卻負吾言聾者仍安於聾瞶者仍安於瞶也吾責之過未免失於刻吾容之過未免失於寬吾不得已又多方動其天良啓其性善蚩蚩者終無變志嗚呼斯世斯民其將伊於胡底也古今大醫王惟吾克當蓋不僅能起死回生更能起頑轉善能化姦成忠能使偽歸真能解暴就和一切有知識無知識如植物濳物騰物皆能感吾之化導而遂其生復其性豈獨衣冠中人哉吾鶴遊於茲將以醫此地風俗醫此地人心使歸於醇厚渾朴內不失其良外不失其體而後快諸子從吾數年吾千言萬語為諸子勵其志發厥良端其品正大其心和平其氣善念日增而孝思日篤吾之待諸子不薄矣吾之望諸子靡窮矣孰意過而輒忘立心立志依然不堪告人是吾之負諸子乎是諸子之負吾乎可惜吾一腔心血付之東流可惜吾數百金科如對木偶可惜吾獎之終不能誘進於至善可惜吾哭之亦徒勞其神思吾其難哉而今而後吾欲無言爾諸子莫謂吾前慈悲而後淡漠也吾為大慈亦為大悲又號度人無量天尊吾之刻不忘斯民也久矣夫天生蒸民有物有則不有聖人出而教導之則性真日牿仁義禮智信等端日漓而不講幸孔子木鐸振響千秋而世道為之大變厥後羣賢大儒體孔教以教世世雖就衰而間有古遺意焉降至於今數百年中誰為振聾發瞶使民風還醇而返朴民德日新而月茂者教化日衰則人心日偽本初日亡其士林縱欲敗度其小人作姦犯科甚至害理忍心逆倫干分吾俯仰其間惜斯民之不能愧勵自新也慨斯民之不能爭自濯磨也傷斯民之不顧身家而保性命也因隨地結壇逢人開導使一人向化千百萬人俱感奉而復其良吾之心乃慰筆機所至非空談炫俗言倫理言德性言躬修言因果言報應而已此數者聖賢皆先吾而論之詳矣特意語渾厚智者知之愚者不省也吾始淺近其説或托於詩歌或形於唱歎無非使智愚皆明其義晰其理以聽吾言而行所當行盡所當盡吾之心血半勞於茲厯有年所奈何愚昧之子自暴自棄不能即吾之片語隻字而遵奉之更有士農工商未嘗不知自好每隨聽而隨亡吾欲就之彼偏遠之吾欲勸之彼轉謗之吾欲提出之彼安於墮落之嗚呼真可痛哭哉一隻渡人舟一架上天梯誰來問及而欲登者吾不得意極矣吾轉念復思民猶三代之民天之愛民終不絶以自新路吾即不得意亦當強顔重宣誥誡務使風淸俗美民無澆漓之習盡成龎古之風為子者言孝於親為臣者言忠於君為弟者言恭於兄為友者言信於朋如此而已乩沙飛舞立出千言一章一心血一節一心血一句一心血一字一心血吾不惜心血將以治斯人之有姦者有詐者有惡者有孽者有不孝不忠不弟不友者使盡聽吾言信吾教以慰吾引誘開導之意吾之勞苦若是爾輩其代諒之莫謂忠孝等事老儒迂談試自捫心果爾是孝子忠臣悌弟信友否少有欠缺即負疚畢生吾願爾等實踐方是真孝真忠真弟真信等人吾每談孝發孝子之幽光談忠發忠臣之軼事此忠孝誥之所由作也即禮稱文王世子書列伊訓君陳等篇意也談弟近則喜稱王覽孔融諸輩談交遠則樂述蘧孔管鮑諸賢蓋看去似易而行所難行盡所難盡故極重之且夫天道亦昭彰矣不孝不忠不弟不友豈有善其身以終者哉豈有諸惡皆作衆善不行而能昌厥身以及子孫哉豈有好善好學明忠孝弟友之義而無所報施哉惜乎奮勉不生私情木化不念身無所貴以心為貴心無所貴以良為貴身能毁心能毁惟此一點靈光則不滅也爾輩重身重家直等靠諸冰山耳癡呆孰甚講空心之法并不是教爾等不食飯不著衣不養父母不畜妻子不過名利心較道義心有差别輕重耳重道義而輕名利則道義中人終不是窮漢重名利而輕道義則名利中人每多成為鄙夫輕重之間須當辨別况吾此身是父母生的君王養的師傅朋友教的吾不自貴其身待如珠玉重若蘭芬徒為本身後嗣而今日磨之明日磨之今歲損之明歲損之漸至血枯心瘁髮禿齒搖使父母顧而憂親友見而悲妻子覩而慨亦何趣哉何若本身修德行仁遺型於後世留名於鄉邑之為愈也昔孔子憂道不憂貧孟子富貴不能淫從古聖賢何嘗顧及身家哉究之子孫昌熾門第丕新千百世而未艾者皆積德以致之也望爾輩打開迷障覔得坦塗樂善不倦後其所私自然果熟子圓天報迅速矣吾重重復復言之殊無倫次無非付爾輩一貼解毒散耳人情莫不好譽揚而惡指責好奬勵而惡譏彈不知所好者美疢我者也所惡者藥石我者也美疢不如藥石前有名論矣吾逢人即以規過摘惡為心蓋深望人之全其為人是迷津之一航盲人之一相也而人往往聞吾刻責之言以為羞恥每多忌厭是亦不思之甚也不觀夫斫木乎雖有橋梓材可供作棟梁不有引繩削墨者依然棄物也又不觀夫琢玉乎雖有連城品可登諸明堂不有磨石錯金者依然非寶也人即賦性極靈秉資極厚尚賴父兄師長朝夕訓迪况下焉者乎聞指其弊革其非而怏怏不樂護過之念萌克己之功疏矣昔子路聞過則喜大禹善言則拜為聖為賢尚如斯之虛懷不自滿假我自問有分毫如仲子如大禹否不是之想而惡聞規戒將欲吾不指責而譽揚乎將欲吾不譏彈而奬勵乎是亦不難今日遇爾即曰爾可為仙也可為佛也明日遇爾即曰爾定發富也定發貴也又後日遇爾更曰爾之子孫妻妾吾保之使賢肖也爾之夀算運命吾錫之使永亨也是即不指責而譽揚不譏彈而奬勵也爾能信乎無已則仍聽吾教滌其舊染勇於自親方不失遇吾一段因緣天下惟不好善者無事天下惟好善者最多事其説何也好善者心雖誠而未必其極誠故天若不知其為好善也而所加較未好善時尤多拂意天蓋試之也非倒施也天蓋磨之也非逆行也所以自古聖賢豪傑負拯救蒼生之心抱安定社稷之志而淪落窮巷必至不堪其苦然後發達今之為善者可推矣陳胡諸子於此功可謂盡厥心發厥願而諸不暢遂將謂善無效乎抑將謂善有效乎淸夜圖維幾怠厥善吾故即古人以發明之而諸子之疑庶少釋矣諸子之善庶愈力矣人之不能得進境者私心纍者半貪心纍者半高貢偏僻纍者又半而實由於從善不如流聽誡不速改以至聖賢仙佛提撕不能信之堅而執之固爾輩從事於斯匪伊朝夕凡吾巽言之爾輩實守之而體驗者有矣乎無有也凡吾法言之爾輩凛奉之而弗忘者有矣乎無有也動存一腔私念謂仙能久降吾已久侍仙必加我以富貴福澤子肖孫賢婦聽妾順與來生善報靡不如意而獲且謂勞勞數載錢鈔未惜是必無不我厚報之理不知爾計左矣此係妄想智者不存是心也爾輩能聽吾言遵吾教吾即力保入善籍否則雖千百金亦祇為粗功耳爾輩中人人豈無善人人豈無惡而以吾教導其間有惡減於彼而成於此者有善增於前而又削於後者即上所謂數纍之故也吾深為爾輩惜吾終為爾輩望一言以蔽之曰改之為貴噫吁嗟乎惜哉何性情之不化如此哉自吾闡教於茲得諸子為之追隨意以為涵三宮齊雲壇之勝會可再見於今矣乃訓迪有年本欲諸子性化其偏情化其偽而諸子竟不果吾於天人理欲辨之甚明誠正修齊提之甚顯更欲諸子復其性平其情而諸子亦不果吾又以下元甲子不為良時不為佳會示之諸子有悟者有不悟者不識此身尚不可知吾性何寄吾情何託吾性無寄吾情無托自不宜任吾性任吾情以速敗吾身奈何只圖目前而不虞後事乎夫風將起而鳥尚覔巢雨將來而蟻尚徙宅物具靈明避凶趨吉人何蠢蠢乃爾乎吾憫之憐之痛惜之咨嗟而歎息之示以淺言指以近理庶冀諸子悚然思憬然悟以變化其性變化其情而諸子終不果士者方矜其才華商者又詡其能幹富者以銀錢為性命而不舍分毫貧者以時運之艱難而益生計較此固吾見之熟而試之確者也獨不思此亦性情所使苟能制其性制其情又何至逐逐役役如此哉至於性發而不恕人情私而不公人尤吾言之淚下食不甘味坐不安席者也噫吁嗟乎惜哉吾恐諸子長欲親吾將有不能如願之一日哉生等既幸生太平幸有好父兄又有好時日理當置外務於不問一心專誦期為一世學成名立之士方是儒者心胸生等非不自愛而讀書一念謀利又一念既有以紛其志則於學問中即低一著矣自今以後學董子之下帷效范子之劃粥飽德不飽味圖道不圖家各求實功以儲國選苦盡則甘來理必然也生等沐吾教導總不長其學識徒以俗見俗聞自矜如禮者體也凡事合體禮斯存焉祀神奉先不吝於物所以明敬也而區區自守者每遂一己之私而失先王之教即如親在向爾索雞豚爾豈必因不忍而阻止乎向爾索魚鱉爾豈必因好生而違背乎觀此則禮之所在亦奚辭焉爾等春祭吝用一羊以自明其不好殺勢必同梁武之治而後可昔子貢惜羊廢禮孔子則惜禮存羊千古至正之義昭然若揭何弗借思乎以後行其禮即不必行其仁行其仁則不能行其禮矣諸子遵吾教導諸事均作得井井有條但少一箇忘字耳所作皆係於心不能過而不留吾故謂少一忘字人固以行善立功為務尤以忘善忘功為貴諸子少作一善輒自喜曰吾作善矣未有以善為當作而不存於心者少立一功又自快曰吾立功矣未有以功為當立而不蓄諸念者上天未嘗不許諸子善功兩端上天究未嘗即許諸子善功兩端蓋惜其不化善功之迹而多善功之見也諸子勉乎哉進於過化之境可也遠來諸子侍吾數次以吾必有異傳耶非也天地之道曰剛曰柔正也而非奇也人倫之道曰孝曰弟正也而非奇也循正路則坦平尋曲徑則荒謬謹之凜之勿違道而並害乎道也人生只講一箇理只講一箇情背理違情不近人情即為大惑長此迷謬堪惜也人生凡説話一切先要在心上等量等量如此人不樂聞此語我即弗吐此語人係器小我説話更要謹愼每見有其人於我原無嫌隙一旦棄絶我者必出言少檢點耳我言之無心彼聽之有意故生出許多故事來是以君子貴愼言凡舉一大功先要內和方能有濟一切事務俱要相商不可自傲自執即有不下氣事亦當以心量心自然氣下大功方始得成酒傷血宜少飮煙傷五臟宜絶吸氣傷肝宜調和財傷命宜輕視教子以方持家以儉行善以勇好德以誠庶幾不愧吾壇之士至於宣講諸生出在外方先以朴誠繼以端方則品行立而言易動人矣凡饋送之餘當權之以義勿得苟且授受也吾牽合諸子到一處諸子數百年因緣於茲聚會諸子須念此因不偶此緣不易視為骨月一般有痛癢則共念之有吉慶則共賀之有凶喪則共弔之至於言語間更宜彼此相諒方不失此良緣良因且既共祖堂均是同輩勿存秦越之見諸子和則諸子之親亦長安於此矣無論遠近春露秋霜之節來茲祀事方不至有名而無實也吾今而知成功之難也矜材者徒自逞其聰明而負氣者又不甘於聽命彼也一心此也一意彼心惟恐其被人抑此意又嫌其被人非於是以我之心行我之是而凡有見有能者皆視為卑卑不足道也而旁觀者亦聽彼之恃才傲物而不與之爭即至事機覆壞亦惟偷視冷笑而已此成功之所以難也今廟宮粗成而一切利益之事尚未大舉正宜協力同心共襄厥成化彼此之見遇事相商期於有功而無過有得而無失方不負吾饒舌數年也昔紂有三千離心離德武有十亂同心同德紂之所以亡亡以此也武之所以興興以此也治國如是修功亦然今爾輩創建此廟同結善緣固千載一時之良遇也竊慮始焉協力一心繼焉各立一心互相抵牾互相報怨將非常之盛舉敗壞于獨斷獨行易曰二人同心其利斷金爾輩念哉否則將貽外人笑也吾春日好遊遊者所以得天地沖和之氣秋日亦好遊遊者所以出天地伏塞之氣吾去歲曾遊於武當峩眉等處今春又復遊過江陵邇來秋將盡矣吾欲攜人遊靑城之五竹嵒諸生願從吾遊可擇行期以行一時之樂上元考較綦嚴關防月餘不覺春光之又至矣至今目覩山花耳聞啼鳥發吾活活潑潑之心殊覺爽快真難得此韶華也吾心如山之峙如水之平峙則無所撼搖平則無所動蕩物與吾有形迹吾與物無爾我也恩怨悉忘親疏胥化吾只還其本然不滓之天而偏全曲直得失是非悲歡哀樂於我何加焉故謂之為間道人爾輩知此亦養心立命之一道也失田得田一憂一喜人如買業萬用不得低色銀兩失業之情可憐厚德之積在茲也銀足九八若歉分毫皆有過錯蓋天惡人之刻也吾嘗執人與物而問於莫是翁曰人貴乎物貴乎人賤乎物賤乎莫是翁勃然作色曰先生何等人於物哉彼人也五穀以為之食布帛以為之衣蓋造以為之居科第以為之貴倉箱以為之富其視披毛羽而戴尾角者真不可與鳥獸同羣也先生何等人於物哉吾曰聞子言是人貴而物不貴物賤而人不賤乎莫是翁曰然人誠貴也物不貴物誠賤也人不賤吾曰子貴人吾且不與之言人子賤物吾試與子言物子獨不觀夫遊蜂乎奉一王以終身出入與從遷徙與共居然明君臣之義也子獨不觀夫烏鳥乎養育之恩劬勞之德必思補報居然深孝子之情也子又不觀夫黃鵠乎故雄失則七年不雙晚獨宿而不與衆行固亦知貞操之宜立者也子又不觀夫鷺鷥乎逍遙間逸於沙渚得食則食叨餮無心固亦知亷潔之宜全者也至若蜾裸負子之仁螻蟻報食之義雁行排序之禮知風覔巢之智趁時催耕之信物也而為忠為孝為節為亷為仁為義為禮為智為信班班可考雖物其身而儼然人其心矣子又何得貴人而賤物哉且子自撫生平數端克盡與否其克盡也亦分內事無庸表異於物其不克盡也則人也而物不如即欲自等於物物將譏為不類嚴絶而痛斥之尚悻悻然曰人貴而物賤乎哉莫是翁聞吾言默默無以應且愧且悔而退豫於甲寅之秋八月草六日天高氣爽夕陽在山間步於緑竹之溪見一老漁蓬首跣足有餓殍色背破網歸至溪右之密林處茅屋幾塌不蔽風日一老嫗出而迎之相與絮絮不知所云頃則老嫗且詈且悲而老漁亦復仰天長歎豫異而詢之老漁曰豫世家於茲祖若父皆以漁為業幸飽暖及愚則運否甚糊口之資賴此以少給而斷炊不時凡四娶育五子皆殤今只餘夫婦二人耳每出網捕爭取者日益多又復溪之上下數十里許魚不滿寸巿之亦不售價生計日絀今晨炊未舉強步網取日西無一獲歸老婦怨痛耳豫聞之慨然歎曰天之生物原不禁貧乏者之採取而取之以時物猶得滋生繁育取其大者小者尚遂其生若並小者而亦取是天方生之人即殺之滅其生理絶其生機天甚不快况一人殺之物猶有漏網之時人人殺之物並無逃生之路天豈忍聽人之戕賊如此哉彼老漁者相繼業此其殺也擢髮難數矣至本身而四娶五育皆殤炊煙屢斷蓋亦有所由致也使老漁能棄此業別圖生活或者不至如斯而終托迹溪流羅之殆盡無惑乎老且困也術之不可不愼也有如是夫豫因作老漁説以戒世之過戕物命者余化一鄉人遊於臨邛道左遇一叟鬚髮皆白衣短布衫背負一囊且行且住若不勝其力者然余問何負叟曰負粟問何之曰將鬻于市余曰叟有子否叟曰有子三人余曰何不使子代叟曰余三子各爨自謀之不暇誰願代者語畢叟去余嘆曰斑白者不負戴王政所以安老也有事服其勞弟子所應爾也今皤然一叟不得扶杖優遊尚苦卓如是以是知世道之不古也殊令我思三代而不置也夫有一白生失其名趾高氣揚向吾突然而語曰夫人處窮廬守陋巷抑鬱殊甚吾欲造臺沼起樓閣日延賓客夜擁妻妾笙樂不絶於耳脂粉不絶於目庶幾暮樂而朝歡吾曰真人生得意事白生又曰彰身有耀適體宜華短布粗衣實形謭陋吾欲夏涼葛冬狐裘錦繡綾羅為我服飾吾曰衣裳楚楚曾載咏于風詩白生又曰博奕之中啓人智慧能遣時慮能消歲月吾欲喝六呼么賭勝負表揮霍吾曰逢場作戲人人有之白生更曰鳥獸魚鱉實為佳殽吾欲畜膺狗操彈丸射飛逐走鮮鯉佳鱗網罟而獲庶適口多異味而杯盤亦生色也吾曰弋于山網于淵亦遊藝事也無足怪白生聞吾言欣然得意而退或責吾曰先生一生好説因果好下針砭今聞白生言不惟不開誠阻抑反隨聲附和奈何吾曰否否不然譬如攻金石不受刀錐愈力攻之則破斧缺錡無益也白生負其盛氣滿假巳極即與之言如對豕語耳或曰然則聽彼縱恣乎吾曰吾聞之人之邪淫不自覆藏不自悔悟詡詡然尚自以為得計天將奪其魄而降之罰矣吾又何言之有不數載白生果以驕縱死或乃恍然語曰吾今而始知先生之不教者皆棄物也然則人幸為先生所教勿為先生所不教庶可以全其為人矣有好道子自號淸白居士經年訪道越嶺渡江不辭跋涉一日憩于野亭遇一長者皂巾藍袍坐石橙上搖塵尾不輟居士向而揖之相與談論并道其學道之切特訪明師長者曰道道道妙妙妙妙妙妙竅竅竅知竅知妙知妙知道語畢而去居士異其言隨起牽其衣曰幸頃遇何遽行長者曰子不我識坐此無益居士乃跪而請曰長者幸教弟子長者曰千金尚不能賣道豈途遇而授受乎若果問道容後至子家遂辭去居士候于家數月不至渴慕益切夏日庒外看禾長者飄然而來居士甚喜延之入室供以酒食一切禮貌出于至誠朝夕拜求大道長者隨應曰順成人逆成仙欲修仙須把乾坤顚倒顚餘無一語相示後居士獻白鏹矢誓言乃教以採取搬運之法其實已入于歧路矣并不示下手功夫遽言烹煉言火候究竟嬰兒姹女相隔天淵黃婆何曾牽引遂使水不能上升火不能下降壅塞中宮頭眩腹脹食少神昏呻吟床第漸至不起而長者已莫知所之矣吾因嘆盲師之害人如此其甚也而塵世之學道被盲師欺誑者蓋擢髮難數矣可慨也夫
