body:
  text: 東園語録東園語録總序江源之北有觀焉觀之東偏其先空壤也陳子淸郭子銘起構數楹樓閣間厰陶子復於墻陰隙地樹以杉柏楠樟等木得土之宜菁蔥暢茂饒子澤又購羣花植其中疊石成山鑿土為沼足勾留也至於遠山之環抱近水之朝宗則又披圖可覽不復再贅吾屢至於斯與諸子訂筆墨緣救弊補偏引於至道復念牖民覺世吾之志願常降言以示勸戒諸子録而藏諸篋固請釐定題曰東園語録蓋以志千載之良會也後之遊東園者曷其三復斯文
