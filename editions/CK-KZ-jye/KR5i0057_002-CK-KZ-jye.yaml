body:
  text: 東園語錄重刋道藏輯要東園語錄序自古聖賢之書皆所以教人遷善而改過也而言之愷切詳明肫摯樸茂者則莫如孚佑帝君東園語錄以孝弟忠信爲先務以人倫日用爲實修以精一危微天人性命爲極功以酒色財氣奸盗邪淫爲深戒不獨文人學士閱之而有益於身心卽婦女孩童聞之而亦深其感激誠哉其爲渡人之寶筏覺世之金丹也且夫勸善之書前聖亦幾大備矣如感應篇之包擴無遺陰隲文之彰明較著覺世經之豁露軒昻其入人之深感人之切者亦旣至矣盡矣蔑以加矣尙何有過乎此者哉不知寶訓森布在百姓或習焉而不知察要不若語錄莊嚴卽顓愚亦惕然而生畏也况乎流傳旣久其中矢志皈依奉寶訓以爲心法者固多而初心錮蔽視寶訓以爲具文者亦復不少則得茲語錄以重爲提撕再爲指迷使人人知先正名言皆觸目驚心之要古昔訓誨悉勸善懲惡之書則不特表章寶訓爲三聖之功臣並可以贊襄三聖爲寶訓之輔翼矣所願閱者知其苦衷澟其精意遵其至教奉爲寶箴旣以淑身亦以淑世旣以成己尤以成人俾作惡之輩能以自新積善之家彌深惕勵庶不負祖師一片救世之婆心也我等同人親炙祖師之訓深沾祖師之恩者亦旣數十餘年矣今當梨棗告竣竊記數言以附驥尾如謂吾之能文也則吾豈敢金仙居士敬撰東園語錄序東園語錄一書乃孚佑帝君神道設教朝夕訓誨同人者也數十年來誘掖奬勸警覺提撕不啻如父之教其子兄之勉其弟師保之課其生徒誠所謂發聾警瞶如聞淸夜之鐘聲覺世牖民擬受當頭之棒喝者歟然語不取其濃而取其淡語不取其繁而取其簡語不取其艷麗而取其淸眞語不取其支離而取其親切且語其常而不語其怪語其正而不語其邪語其顯而不語其微語其新而不語其舊故語仁敬則使人知有君臣語慈孝則使人知有父子語有序則使人知有兄弟語有別有信則使人知有夫婦朋友卒之語彌淡而彌永語彌簡而彌長語彌淸眞而彌中肯語彌親切而彌有味謂非可以引人共出迷津導人同歸覺路者哉然吾因之有感矣慨自世運日下風俗日偷習染日深人心日變語以陰果報應則啞然以笑矣語以名教綱常則艴然以怒矣語以遷善改過則茫然若迷矣語以修德行仁則惘然如失矣在在沉迷誰挽狂瀾於旣倒滔滔皆是孰作砥柱於中流不有帝君語語肫摯語語詳明語語箴規語語藥石其何以扶世運振風俗革習染救人心也哉所願閱斯錄者革面兼能革心正己亦復正人庶不負帝君神道設教殷殷訓誨之心云靜定子敬序東園語錄序且天生聖賢非欲使之自有餘而已將以補斯世之不足也得其道不敢獨善其身而必以兼善天下故孔子憂萬世之大義不明托春秋以見志孟子値處士橫議之秋不得已以正人心爲己任彼一聖一賢豈不知自安佚之爲樂哉誠畏天命而憫人窮也純陽祖師學孔孟之學卽志孔孟之志其發爲文詞也上以接心法之傳下以救蒼生之阨今讀東園語錄一書論深切於人情言不離乎忠孝至如隨事箴規之法因材施教之方其大無不包者亦細無不舉可謂盡苦口之藥石鍼害身之膏肓也後之獲是編者口而誦之心而維之身體而力行之澟乎祖師一嚴師也語錄一日課也庶不負立言之苦衷垂教之深意也夫王培楨敬序東園語錄序東園語錄一編純陽呂祖憫世俗之澆漓憂人心之淪胥慷慨悲歌勸善而作也今之人每諱言善且譏人爲善噫豈非大恠事哉不知聖經賢傳皆勸善書也曰吉人爲善惟日不足曰積善之家必有餘慶曰天道無親常與善人大舜善與人同禹聞善則拜文王善事陰行他書言善者難更僕數况人之初生性本皆善則孝弟善也忠信善也禮義亷恥亦善也推之利物濟人誘掖奬勸一切方便之事無非善也乃牿其性者反以作善爲好名行善爲多事爲善爲邀福於戲爲是說者愚深窺其隱矣一言以蔽之曰吝財不過欲多積以貽子孫耳獨不思財未有積而不散者服御之奢侈身心之邪淫命運之乖舛種種耗財不一而足卽使貧不及身而不善之人子孫不肖轉瞬間祖宗之刻薄慳吝銖累寸積者一旦同歸于盡以視散財作善孰得孰失辨之宜早也且慷慨樂施以善散財財未有不復積者蓋旣知爲善必無侈奢淫蕩之行時有節儉勤愼之訓子若孫耳聞目見家法流傳昌熾必久理有固然不止禍淫福善天道之常爲可信也流俗吝財之習愚蓄于心目匪伊朝夕茲就序東園語錄發之伏願見是書者回頭猛省孳孳爲善急盡孝弟忠信禮義亷恥及利物濟人誘掖奬勸一切方便之事以復其本性斯爲善體聖賢經傳而不負呂祖勸善之厚望也夫饒性貞敬序東園語錄序客有卒然而問者曰予聞近有大醫王之說信乎予曰然客曰何謂也予曰夫所謂大醫王者其上醫國其次醫人不需藥餌可盡天下而調治之者也客曰醫安在予曰此醫恒無定處非誠意不可致非勝地不能留惟東園時息駕焉園有花可賞心園有卉可寄興園有山水可登臨灑然適然歡如也及一念夫害心害身不克自治之輩則又翛然悲惻然憫急起而藥石之如孔子之醫狂矜愚先去其蕩與忿戾與詐之變本加厲又如孟子醫好色之疾而以太王爲鍼醫好貨之疾而以公劉爲砭醫好勇之疾而以文王武王爲良劑必欲至於返本回元而後已於是以不藥之藥著爲良言詠歎之詞題其名曰東園語錄此亦猶古之靑囊等編也子誠取其書而讀之雖不可救藥者亦可望治又何疑於大醫王之說也大醫王爲誰燮元贊運演正警化孚佑帝君也龔森三敬序東園語錄序嘗思三代而上道在君相三代而下教在師儒迄於今教化雖行而師道不立卽有六經四子之書牖民覺世讀者恒視爲科舉應試之資而莫究其所以然此教之所以不興而道之所由不明也純陽祖師抱慈悲心爲生民計前於涵三齊雲等處作以闡道垂教者彚集諸書蓋詳且盡矣今讀東園語錄一編或發爲文詞或托於詩歌其事則倫常日用其理則性命身心而其寓勸勉之意與警戒之辭隱隱乎與六經四書相表裏焉後之讀是書者果能體之於身見之於行卽其義以揆諸六經四書之旨而爲之屬辭比意互証詳明庶幾六經四書之義復昭然於天壤燦乎如日星而士林中不徒視爲科舉應試之資矣則其輔翼乎六經翊贊乎四書也豈淺鮮哉易曰神道設教於茲見之卽於斯信之矣而君相之道師儒之教不賴此編而長留不墜也歟趙性和敬序東園語錄序昔春秋有孔子胞與爲懷不能行其道於天下日與其徒講學東山一時從遊者皆得所裁成以變化其氣質門弟子輩錄其語言問答倫次而編集之名曰論語雖其中論說不下千萬言而約之則心法推之卽治法也由孔子而來至於今千數百有餘𡻕矣民風不古世道漸衰不有帝君以維持補救於其閒愈趨愈下伊於胡底也今讀東園語錄一書所載詩歌諭文各體因人啟迪隨事箴規仁義禮智植其基也忠孝節亷端其本也語言動作詳其末也本救世憂民之苦衷揭而示人以遷善改過之路實與孔子之言相爲表裏讀是錄者誠體此而遵行之心性復其純良風俗歸於渾厚一世治萬世治萬萬世治則東園亦一東山也語錄亦一論語也孔子先天之帝君帝君後天之孔子也宿映川敬序
