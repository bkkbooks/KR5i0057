body:
  text: 東園語錄東園語錄總序江源之北有觀焉觀之東偏其先空壤也陳子淸郭子銘起構數楹樓閣閒厰陶子復於墻陰隙地樹以杉柏楠樟等木得土之宜菁葱暢茂饒子澤又購羣花植其中曡石成山鑿土爲沼足勾留也至於遠山之環抱近水之朝宗則又披圖可覽不復再贅吾屢至於斯與諸子訂筆墨緣救弊補偏引於至道復念牖民覺世吾之志願常降言以示勸戒諸子錄而藏諸篋固請釐定題曰東園語錄蓋以誌千載之良會也後之遊東園者曷其三復斯文
