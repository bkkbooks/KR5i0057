front:
  text: 東園語錄重刋道藏輯要卷之下東圍語錄
  hash: sha256:55e59b1a6d614b087dc99b456dce697744680d08b95a96c1c442daf6efdf7033
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-KZ_KR5i0057_05p001a}
body:
  text: 平雲堂眞如居士崇德堂眾姓捐資敬刋人生年近古稀精血就衰宜力澹嗜欲安定神志一切家事子孫之計可不必勞其思而動其慮思我一息尙存固如是矣倘或淹淹不起又將何如孔子曰及其老也戒之在得蓋得者喪名之具亦損身之媒也夫旣往之光陰不在將來之歲月無多哲士知幾謝卻時慮靜養天年斷不可終日終夜而猶縈擾不甯也示陳子崗如金如玉士之品也諸子厯學有年卻不以金玉自待言多浮躁行多粗暴全無一點涵養體度常人并處不覺其粗雅人同居則自形其俗矣吾故曰不以金玉待其身示諸子居心自善不如與人共善鄉黨中有可勸者勸之有可戒者戒之勸戒昭然卽是成己成物工夫勿視爲淺也苟一切諉爲非切身之事則居心先左蓋人要生有益於人死有益於世雖婦人孺子莫不感吾之勸戒而翕然丕變從此做去功莫能量示龔子三人莫把己身看大了又莫把你身看小了看大己身是謂輕狂輕狂則無福看小己身是謂局促局促則無量於世故中甯卑人一等不高人一等則不自大而人自重之於德善中不讓人於先恐落己於後則不自小而人自欽之兩者當互而用之示梁子彥眼界不寬則心思多蔽古人學古皆從觀覽而來如欲學忠臣則當讀忠經如欲學孝子則當讀孝經其他可類推也淸之心思澁甚須於靜夜黎明時掃室焚香正襟端坐莊誦南華法言等經及古詩歌等類則心自淸靈淸靈自不滯於物不蔽於心久久有魚躍鳶飛之趣到此地步吾更示之示陳子淸士之所貴者貴有優容之度量尤貴有振作之精神有振作之精神天下何事而不可任哉子卻少此二字是一生之累何也不振作則心志頹心志頽而可己者己之卽不可己者亦己之矣勇於聞勇於行何以稱焉示劉子甫人生所當盡者有本有末本先末後兩者有次第無重輕子四十以來知敦本矣此得其所先也但於末節多未講究有缺䧟焉以後盡末節如敦本始則不至細行不矜而累大德也示劉子聘人不在讀書與不讀書而心地俱宜勿昧慈者此心剛者此心不屈者此心不謟者此心何謂慈如孝弟之良是也何謂剛如不甘人下欲出人頭地是也何謂不屈羞惡之心致之也何謂不謟傲骨自在無所枉撓也人於此立定腳跟立定志向内盡其職外重其身人縱不我貴而我自貴人縱不我尊而我自尊示蕭子桂近日全賴士輩維持風化人心澆薄世途險巇不有士以整齊之有不堪言者矣爾輩甯受迂腐之名逢人講些三代以上話使奸者巧者頑者愚者强者弱者皆聞言而戢其私革其惡奚啻木鐸之教責任所在勿得推辭示彭子皆陶子根器不薄孝友性成吾因與之講道論性布天梯而欲其步挂雲帆而冀其登也一生無他只憂貧一念時常縈擾於心不知富貴窮通天命有在貧而非病正助淸修若顧慮頻生阻卻無限進境自吾提覺之後不可猶效韓宣子之故態也示陶子復人無定命人有奪命之時視人之自爲耳當日裴度了凡諸子命極淺薄而不以命爲役獨以人事爲功命終莫如之何子於起居食息時自問人事盡否未盡則勇往直前己盡則益加策勵似此方是奪天手段未至斯境不可歸咎百端示趙子輝人生世上雖不能獨幹大事獨成大功而玉成大事大功亦不負天地生我一場勿以無益之事而勞形務以有益之舉而盡力則生生世世留爲美談况此功創古希有正宜認眞扶助語云萬兩黃金不足恃惟多功德榮子孫體之可也示蕭子健凡人心要虛要靈要活潑要圓通心非無物心究不物心非不事心究無事養其淸空渣滓胥化朗然如明鏡之高懸如冰壺之照鑒則魔境自消矣示彭子通人年卽幼須小子而具成德之稱方不負此年少遇一益友則親近之遇一損友則疏遠之居塵囂之地目所見耳所聞身所接每多快樂事卽於此時放開智慧思及樂極愁生興盡悲來古今大抵如是爲之謝卻邪人舍卻邪徑終日閉戸讀書以探聖賢實學不求眼下浮名遇有可矜可憫之人則矜憫之遇有當作當爲之事則作爲之如登高然層纍而上轉瞬卽步雲霄回視下方則有天壤之別此眞快樂事也至於父母乃本根之人子道無虧方獲天佑而報親不在酒體肥甘而在克守家聲無一事不可以對父母無一言不可以告父母如此則親安而子道盡矣本卽報矣示尹子容宣講一事近時所極不成事體者莫過於好開奇傳好尋奇案好歌新曲致使愚夫愚婦喜聽而無感發以後勿好新奇仍從正大一切忠孝廉節俱要發出古人心事志意庶古之忠孝廉節昭然於千百載以下而啟愚感頑始有實效示高子庭吾闡化蜀西非僅爲一州一邑計將欲由近及遠使多方向化滌舊染之污開自新之路而觀望不前者實多吾又安能招之使至哉所惜失此良因迷途莫返士林則誇文采風流終鮮德行商賈則矜經綸才幹卻少老成以及諸色人等皆妄想妄爲不返本而還湻此世風之所以不古也今爾輩値末運之年尙有悔悟之念吾故欲引之於至道若果能從此洗濯身心盡厥忠孝復其仁義利物利人修善修福一切世態視若空花則豪傑之士斷推爾輩示郫邑諸子宫中舉行善事十條一惜字二養節三義學四施棺五施地六施草衣七施醫八施藥九放生十印送善書至於諸般善舉隨時隨遇隨緣爲之故不盡書現置水田數百餘畝可足於數事用尙不足於事事用每望大善同歸慈航共載然亦只爲好善者道未可爲外人贅也爾承忠厚之遺澤綿一綫之流傳當放出大見解大智慧超然特出作利人利物等事修善修福等因不擇時不擇地隨遇爲之以保己身而報親恩以求消阨而福閤族也示潘子虛謝氏父子叔姪兄弟雍雍一堂已屬僅見又能遠來竭誠足見善根但行善有利卽有害非善之果能害人也行善而至迂拙處害卽伏其中矣爾方風氣不甚湻樸以孝友帥之此得其大體也至若誦經禮懴修齋度㧞幽魂等事則迂拙甚矣禍每及之近有炫左道以惑世者此等會場斷不可入愼之愼之示羅江謝氏行善如耳鳴自知之自信之不求人知不求人信方是眞善不勤於始而怠於終方能全善不希利益於目前不期獲報於異日方能忘善如此行去善益大焉且善不分遠近不論難易善乃普遍示綿邑諸子尹子等積善有年近今一大善舉當爭先作去如輸將一事望之甚殷需之甚迫不有出而應之者國事何以濟君心何以安試想人生在世貴存忠義今日國庫空虛不得已而求之於民民卽當體不得已之心以任之思我祖宗及我父母及我本身子孫世代食其土䝉其教安其業未嘗苛虐其一二君恩不較重於親恩哉親有欲子當遂之君有令而忽之可乎或以身倡捐或以言勸眾務令鄉村城巿均知此義爾輩效忠之日其在兹乎示仁邑尹氏近時愚頑全頼宣講勸懲備至感化無窮於講時務有一片眞誠奬勸誘掖多方開導不可立論荒𣺌不可有心譏眾不可故意嚇人果能忠告善道斯至情至性流露於齒頰之間未有不動人聽者矣示三台諸子性和尙無他過且賦性仁慈合吾慈悲心吾喜收入門下凡吾收入者不下千餘人不知者謂吾在傳道傳丹而不盡然也人有一德可嘉一行可取吾卽不棄亦憐才意也示趙子和宗族而外最親者莫如鄕黨蓋不特不可以富而驕貧不可以强而凌弱而於矜孤恤寡敬老慈幼及施濟等事皆當勉力行之示李子純孝爲人本本立道生有推之百爲而皆準者今人每好登山朝佛求嗣問財吾謂不必遠求只在近所門内之地活佛居焉果能克共子職無忝孝思則佛神佑之吉慶隨之矣示德成飮食之中有禮存焉如禮載天子七諸侯五大夫三士一皆從禮品節而出逾禮則犯分矣庶人較天子諸侯則遠甚較大夫士則亦遠甚卽家擁厚貲而有禮以限之不得越分奢侈若一品一味罄貧漢數月之費未免天心不樂惟舉箸之下卽念及宇宙間此刻斷炊者不少則侈靡之習自然消阻亦惜福之一道也示趙子恩安逸非所以保身實所以惰身身惰則志與心隨之矣故陶侃運甓書齋劉琨聞鷄起舞其克自振作如此古今遂傳爲美談示張子陽勿欺二字是成人門戸凡事之不能告人心之不能對天處皆是欺惟孝子不欺於親忠臣不欺於君良友不欺於朋淸白不欺於天地正直不欺於神明此是聖賢種子勿淺看過示張子培凡事不可由己由己必不能由人不知好惡同情人己一致己所不欲勿施於人若袛知有己并强人以從乎已是將强牛之性爲馬之性此不近情之甚者也是謂偏私是謂乖僻示臧子鳳身雖六尺妙合三才時時持之以敬事事矢之以畏敬畏深而縱恣少凡辱身賤行之事皆不敢爲斯始謂之守身斯始謂之孝子示吳子榮義者事之宜義所當爲不爲則懦義不當爲爲之則失辨義之特識固在平日亦在臨事若事一至而毫無主宰從違莫定人謂其無勇又謂其無謀識者則謂之不知義示臧子恕人每樂人知憾人不我知此是邀名務外心病不知人卽我知於我何加人不我知於我何損孔子曰不患人之莫已知太上曰知希我貴是以聖人被褐懷玉則知不知在人而可知自在我示左子誠天將雨而商羊舞天將風而燕雀飛凡事有其機先時者機洩後時者機滯惟迎機而任其自然少卻了許多逆億亦少卻了許多煩惱示劉子仁錢字從戈利字從刀人以爲肥身之物吾以爲賊身之矛君子則祗於德性憂欠歉不於財物爭贏餘示胡子仲夜行則惡其昏暗徑行則憎其荆棘人之同情而此心之昏暗則不自知此身之荆棘則不自去其疏於防檢者實自荒其心志矣示段子昌籬破知補水溢知防慮其害己也而一身之愆咎不防而堵之不悔而補之是猶開門揖盜而安於泛濫矣害孰甚焉示吳子榮馬行千里其價百倍以其能致遠也然馬以千里稱羣馬之中往往有之尙非超羣而絶類者也孔子曰驥不稱其力稱其德也人可憬然思矣示澹香善馭車者六轡在手縱送自如一日而可行千里卽高山深谷顚覆可無憂善馭人者百情在心包含不露一和而可納干人卽姦邪僞妄感化於無形示郭綍菴燕雀在堂不知巢之忽覆蜻蜓在囿不知網之已張人卽處順安常而思患預防之心不可少所以君子安而不忘危示劉子霞雨暘時若則百物生雷風鼓盪則百物暢人負陰抱陽分天地之餘氣不思有以充足之反戕賊之牿亡之不幾深負天地生我之心乎故靡靡者常屈而超超者常伸示鼎臣日盈則食月盈則缺山盈則崩水盈則溢這個盈字名美而實不美人欲持盈莫若守謙易曰天道虧盈而益謙地道變盈而流謙人道惡盈而好謙鬼神禍淫而福謙謙尊而光卑而不可踰君子之終也示左子龍象因齒而焚身璧因懷而獲罪石崇豪富莫保身家宣子憂貧幸聞規戒觀此則知人之不善處富不惟招怨喪名且多亡身召禍惟不自富其富處之歉然視之然庶不至多藏而厚亡示諸子關弓則知避操刃則思逃懼其傷己人人同情不知忌刻多攖兵刃言語每召戈矛一切利己損人皆危身之具欺世敗俗悉喪命之根惟君子坦坦平平兢兢業業晝無戮身之憂夜亦無驚心之夢示鄧子高雞則鳴更犬則吠盜値其時而不鳴不吠人將殺而烹之謂其無信也夫人頂天立地此身之關係匪淺若無信則無主無主則無爲孔子曰大車無輗小車無軏其何以行之哉示藩卿范子累代積德兼一生繩墨不踰又能孝友陸婣任䘏又能戒殺放生又能行端舉正又能教子有方眞翩翩然濁世之超羣脫俗者也微斯人吾誰與歸示范固葊凡人當思我身是父母之身不能顯揚其親不足以爲人子夫所謂顯揚者豈必巍科高第前呼後喝哉如我能孝弟則顯親以孝弟之名我能忠信則顯親以忠信之名我爲善我之親卽得善名我爲惡我之親卽得惡名善惡在於自作而親名隨之人子可不愼哉示劉子貞人之生也都愛尋樂處不知樂不在樂中求而在不樂中求樂中求藥烟花遊戲歌舞風流如朝露晨霜轉瞬不見不樂中求樂則知慮後知奮時知刻苦知艱難事事謹凜步步戰兢則樂在其中矣然我樂矣當思人猶我也何妨使之同樂物猶人也何妨與之共樂仁民愛物之心存而天報日益厚積善修福之念切而子孫日益昌所謂積善之家必有餘慶也樂乎不樂示楊子全人至半生半多可已之事人苦不知而不已遂因不已惹出多少煩惱來吾見有朝靑絲而暮如雪者未嘗不嘆斯人之不善自爲謀也少年多失時光必待補於末路四十五十補過之時猶不知補而營求不已時若可待而難待力若可恃而難恃不如急早轉身雖淸澹勝於富貴矣况身以心爲主心以血爲衞不顧精神而磨其心傷其血旋見體日衰而病日增矣善保身者服藥莫若養心孟子曰養心莫善於寡欲示牟子仁爲善最樂與營名求利等事大相懸遠善無窮盡以遂我之心而止如一人一物不得其所吾心卽不安必使之共遊於太和之宇吾心始安待人待物殊無二致卽眞善也他如造橋修路等端或獨任或助資隨其時勢便力爲之較之費於飮食衣服應酬贈答者眞有天淵別也夫財有聚有散聚而不散則生孼散之不以道則亦生災惟聚之之餘先將每嵗用度計過餘卽散之於鄉鄰困苦鰥寡孤獨及疲聾殘疾一切善事上雖散也而天必使之長聚矣示趙子輝曹子尉近日國事値需財之秋端賴有輸忱之士子可逢人開導勸以忠君愛國之言激以急公忘私之義使一人倡義於前千萬人向義於後則國用庶幾有濟示葉子靈蘇氏弟兄䝉祖宗福庇致有今日温飽須念此日安樂而往昔愆尤不可不急爲洗濯培植將來况富貴福澤惟德可久誠能善善從長則諸孽頻消超祖先而福父母延夀命而昌子孫至大利事至大美事至大快事時哉弗可失也示蘇氏修積不必盡以銀錢爲功德只要處一鄉爲一鄉之望在一邑爲一邑之宗善念日增而月茂善言日著而月彰務使頑者轉醕奸者轉良寸積而累之如萬仞之山可平地爲也示王子川士子讀書須先立一箇定志思我將來出身必與國家作一砥柱之臣與百姓爲一慈惠之師方是眞正學問勿徒以文字爲求美衣美食計也卽或遇有不齊而抱此志以持身亦是范公一流人物示饒子貞善始尤貴善終能創尤貴能繼此廟功已半成爾父出錢出力及從善多般實體吾教而感天心矣但數十年後又是一輩特出此功永遠不朽端賴爾輩繼志吾於田契每教多註人名欲使爾輩後日不得聽從一等不肖子孫敗壞此功也如定規九條逐件遵行不視爲虛文則善矣示陳少梧識時務者呼爲俊傑蕭彭鍾等則不識時務者也甘心茹素每滋物議諸子果眞心修行爲善莫先於立德立功豈必在此小節哉近日誕妄之徒以左道惑世稍不檢察禍機暗伏諸子還不悟乎示蕭彭鍾諸子人生皆有忠義之良豈必出身加民始能盡忠哉卽如近時團練是得以効忠時也本朝王章聯保甲一條昭示天下果能實心行去亦卽忠義雖不能藉此以捍大患禦大敵而土豪鼠賊皆畏而不敢發亦安靖地方之一著也劉子勉乎哉卽費多金有益無損示劉子聘爾小子輩有己開知識者有半開知識者須念作善一途是我生分内事亦是我生體面事作善之心逸日休不比作僞之心勞日拙旣經來此親聆訓迪當以所見所聞盡銘胸次作箇父作子述示遠近小子輩古人克治身心最嚴最密於先聖格言警惕語外又復自爲銘盤銘劍使觸目而警心如程子四箴等類難以筆錄吾人生古人後正宜抄冩諸銘貼之戸牖是亦懲心改過之一法也而銘之令人深悚者莫若座右銘其銘辭有貨利者亡身之藪嫉妒者刎頸之兵淫戲者絶嗣之塹貪欲者喪命之窖等語眞是明顯道破使人讀之而汗浸座右銘龜卜先生所作也示王子善富有不足恃節儉乃足恃衣服飮食宴遊不循乎禮多奢一次卽折福一次非傳家之道也昔人云一叢深色花千戸中人產豈知兩片雲戴卻數鄉稅此雖爲官府而言而奢侈之禍誠非細故居家者亦宜鑒之示劉子霞人愈自大則拒人於千里之外人愈自小則誘人於斗室之中太上曰江海能爲百谷王以其能自下也人當以江海之量爲量也可示胡子僑莫謂善小而不爲莫謂惡小而無傷莊子曰任車未毁童子可行一旦傾危顚高墮谷千人不能安一卵之微彈指可麾其爲蜚鴻振翼冲雲罾曾會繳不能制以是知微善可卜吉祥小惡可至滅亡示蕭子健凡遇人有一言不是一理不合當從容應之移時再爲辨論不可當面搶駁使人無地自處且生厭而不與之近非接物之道也譬諸駒犢動加鞭扑則性愈驁而狂奔遠逸惟順其性而豢養之撫摩之自然帖伏任其駕馭無不如意矣示趙子仁懲心之法莫先於割愛夫愛害心之媒也心一中愛則心之所向有固結莫解者形於食息寢興之餘而於妻孥爲尤甚獨不思兒女之私情實縛身之韁鎖也我生生聖賢後不能與聖賢爭道德徒以不堪告人之心縈擾牽纒不惟見絶於聖賢亦且虛生於天壤矣甚可惜也示鍾子本天地之利有限人之用宜節若一日而罄數日之用一月而罄數月之用天地亦無此贏餘以給我之需夫人節省有度惜福殊多子孫可卜豐足蓋儲之者多而流之者長也然節可爲嗇不可爲若以嗇爲節天將惡其鄙吝必不能使世世長守其富有也示蕭子湘好惡者人之同情我之所好不能强人以不好我之所惡不能强人以不惡然好其所當好惡其所當惡是謂眞好眞惡故能好能惡歸之仁人若好人所惡惡人所好是爲偏好偏惡拂人性也且好惡一偏則是非顚倒公私混淆壞世亂俗莫此爲甚所以孔孟嚴絶異端示王子橋疾風之來也人知閉戸驟雨之發也人知張蓋無非爲避風雨計而世之傷人辱體較風雨爲尤烈者人不思避且樂蹈之吾竊笑其人不學其他而偏學赴燈之蛾也示蕭子明寸雨亦可澤物點火亦可燒山充其善量人人可爲堯舜縱其惡念人人皆是盜蹠故君子辨之於微而謹之於始示高子端人惟不自滿則含蓄自深人惟不自小則經綸愈大聖賢門戸尙未識其方遂謂已步其堂奧此不能欺人實爲自欺事業功名自謂力弱憤勉不生此非人阻實爲自阻惟虛心以討聖學之原大力以應天下之務爲兩得耳示趙子和少年如春日鮮花暢茂挺秀然不時加灌漑則膏液易竭來春未必猶如是之繁茂也是可觀花以自悟示汝俊人固貴和氣迎人尤貴善氣迎人若只喜笑顏開而無涵養以充之實形浮僞不足爲子弟法也且人之心當體天地之心以爲心天地之心公而不私一人在天地心意中人人在天地心意中推之恆河沙數人無不在天地心意中苟於起居食息之餘惟欲己富惟欲己貴惟欲己安惟欲己夀而世之貧賤殘廢孤寡不生憐恤是負天地大公之心己絶其生機之理豈稱特識者歟示王子玉人蓋有外誠樸而内奸險者不用吾之視觀察以核彼之所以所由所安一頃接之間聞彼談論見彼動履遽信其人而親近之愛慕之并不於談論動履窺其自性與否更不於幽獨隱微瞷其行藏若何是之謂不識人是之謂枉用愛示車子石鹵莽足以僨事優柔亦足以敗事處己處人總以義理爲的事之合義合理身任之卽赴湯蹈火亦身任之任以事實任以義任以理也若遇一事始則慷慨繼則狐疑終則置之度外此皆優柔寡斷一生鮮成幾宗大事并失卻了許多義舉示彭子吉治私工夫實難多得昔有其從子抱疾終夜數起詢問其親子抱疾雖終夜未一起而心之驚懼憂慮夢寐不甯較前之數起則有眞僞之別此卽私也治得去此等私自然衷懷坦白可以對天地質鬼神而幽獨無愧怍矣示宿子瀾天之生物俱有用處如鳥則鳴春蟲則鳴秋當春鳥不鳴則發育之機不著當秋蟲不鳴則嚴肅之象亦不著是鳥蟲等皆有用於天地而人之待用於天地宜何如乎縱不能爲天地立心爲萬物立命而有功於世有益於人諸大事當身任之而弗辭否則成自了漢一流人物示劉子甫淺近之說不難立解惟講到理字上則進一層更有一層實難盡探其奧如地之理與天之象互爲對待與人之命互爲相生非淺見者所能窺其微也若只執陳說而未會其竅不必東指西顧貽誤世人能解地理者先參天後參人天人相貫始通照曜始通呼吸斯謂之地斯謂之理示徐子信人情援勢者多忌勢者尤多以彼之勢不如我之勢於是百般計較必挫折我之勢而後止必傾倒我之勢而甘心當此一出一入如臨於谷稍不提防未有不中其毒害者君子則知遠害其道在守之以謙示饒子澤人孰不欲亨孰不欲長亨而不能如欲而亨者大半蓋天不錫我以亨何以得亨何以得長亨惟平日心可質天事可告天善可格天自然履亨衢厯亨運而自少至壯自壯至老皆膺亨吉於無盡示長亨田舍之子霑體塗足經年辛苦固是衣食之計而衣食只可養家不能肥家惟力田之暇不廢讀書敦倫立品修德行仁則眞肥家之事示熙明武周達孝在善繼善述則知繼志述事人子宜然若以父志爲不必繼父事爲不必述則父之志與事遂泯没而不彰所謂其父拆薪其子弗克負荷者尙得謂孝乎示崇功杞梓在林不能使樗樞之不並植鳳凰在郊不能使鷹鸇之不並生麒麐在山不能使𧲣狼之不並長龜龍在沼不能使鰕蟆之不並育人生兩間賢否不一良莠不齊必峻其門戸病其浼污嫉惡如仇獨行踽踽則與世太刻卻少包容是未體天地含宏之德而純是血氣之私非處世之善道也示周子六塵世佛家謂苦海又謂火坑誠見人之憂喜哭笑幻若戲劇生老病死速若蜉蝣以苦爲樂以危爲安足可惜也人縱不能免此八字而家事子孫之計得半卽止不迷茫於空花力樹滋於實果累行積功異日撒手歸去自有面目見我老門肖示劉子蘭放下屠刀立地成佛千般罪過一悔便消是天不絶人以自新人當幡然而舍舊且世間樂事惟道義中爲無盡倫常中爲無窮若果孳孳爲善則體舒心泰較之有損無益之樂孰得孰失不辨可知抑人生上貴能承先澤下貴能則兒孫若祗庸庸碌碌無一善足稱無一德可錄直謂與木石居與鹿豕遊耳示宗甡玉藴於山璞誠寶貴若攻之則破不足珍人之身亦猶是也守其遺體不敢毁傷則陰隲在其中品格處其中福澤亦在其中所以君子守身如玉示儒芳厚德足以載福敦厚足以立基厚者薄之對也薄則輕薄則刻薄則狡薄則滑以之處已與忠恕悖以之處人則誠實亡而一生之福祿必由是而削少年子弟宜深戒之示定楨爲學如行路然進一程又有一程卽遥至百千程亦必步步走到半途而止不可也所厯之程已過大伴僅餘數程輒止亦不可也惟蹈實行去直完其所期到之程雖愚也必明矣雖柔也必强矣是在有志者示興俊虛心下氣之子每樂聞規戒有規戒則守之不忘痛自改過雖無父兄心裏儼有一父兄雖無師長心裏儼有一師長不面從而退毁時卽戒以創心此等人有受教之誠斷無有不成材之理示正中文昌陰隲文乃傳家之寶太上感應篇實保命之符時觸目而警心自循規而蹈矩立德立功體先聖之訓典敦孝敦弟盡子弟之儀文戒殺好生敬字惜福與匪辟遠與良善親爲人如此家道長興示樹勳禹惜寸陰侃惜分陰一聖一賢見得人生歲月疾如電火多一日曠閒卽少一日德業且古人三餘學足何嘗片刻放過卽不在學中而守正業爲正事亦須惟日不足若坐失時光老至嗟悔無及矣示祖昌天地間富者二三貧者八九豐年尚可聊生歉歲卽難養活一家數口斗米千錢兼以囤積居奇倉儲閉糶惟困處呌餓而已孺子何辜啼饑不已老年無計莩死殊多當此眾口嗷嗷實屬憂心戚戚出倉粟則百弊叢生捐米貲則萬人難給惟設厰煑粥可暫可久救荒之策莫善於此有力之家相與玉成積少成多煮散窮困厥功匪細示彭子衢人當大著眼孔莫爲巍巍者所煊赫蓋功名富貴數之無窮見之實夥一人而我豔之人人而我豔之將有豔不勝豔者究之於我何加惟修德君子是爲聖爲賢地步雖與之執鞭可也示本堃皇天無親惟德是輔人欲致福莫先修德修善修德修善福之基也自古永膺多福或在其本身或及其子孫者必其德之積久而彌光善之充類而至盡也子修德修善有勇心而無退志天其將福女矣示姚子福人生四體皆貴而貴之中亦有賤者如足是蓋足日霑泥塗不比他體之潔白古人著履朱履文履而外盡著賤履不似今人之華而且費也然此沿襲旣久殊難返古惟在誠樸之子不趨時和俗斯可挽其一二示正中出家者舍父母兄弟而出乎家也自此養育之恩莫報骨肉之情己疏似是人生不快之事不知修行亦可度親改裝亦能報本若果護持庵觀希步佛仙是卽進身之階亦卽顯親之道示劉本明處家去一私字固是公能服眾然只不私而不待之以和事事嚴厲則又啟兄弟伯叔内外大小疑忌非聯絡家人之法也惟不私以示其無他柔和以昭其親愛則雍睦一堂家風綿遠矣示洪子揚乳燕毛豐卽可穿雲鴨卵初脫卽知戲水人當童年作驚人事出驚人語者子建公瑾陸績諸人尙矣而壯歲之克自樹立者尤指不勝屈人果能發奮振作豈必待父兄之訓誨耶孔子曰父在觀其志父沒觀其行三年無改於父之道夫三年無改則終身不改矣示定遠昔有一頭陀終日在馬祖庵外磨頑石馬祖問曰磨石何爲頭陀曰磨鏡馬祖曰頑石豈可作鏡頭陀曰坐禪豈能成佛馬祖大悟是知人之修行立功并無止境必不限以程途不計以年月恆久不懈自然如石之可成鏡矣示尹子衡學者學爲聖賢也今世之學者每謂聖賢何人我何能學此是甘於菲薄而所學可知矣獨不思聖如孔聖嘗曰我學不厭賢如顏賢嘗曰請事斯語則聖賢原從學中來我輩不學聖賢所學何事且我輩卽學聖賢尚不能得聖賢之近似不學聖賢豈不去聖賢門戸遙遙百千萬里哉我輩之生質縱不比於聖賢之生質而生學安勉同底於道聖賢不許我輩學又許誰個學耶彼程朱周等學聖賢者也我輩不學聖賢將程朱周等之不欲學乎程朱周等如不欲學無惑乎不能學聖賢矣有志實學者其思之其熟思之示子香積善之家必有餘慶此語出自聖人今人每藉此餘慶二字生出許多冀倖之私稍不如意謂先聖說誑不知必有之說乃據理而言其積善而無餘慶者亦理之不可知者也不然孔子不應阨陳蔡周公不必遭流言善如孔子周公尚不克見諒於當世况非孔子周公乎總之積善在我餘慶由天退悔之心不生累積之功勿輟示尹子道主敬之學由内及外亦從毋自欺做起幽獨之中覩聞不及稍涉放縱暗室欺心旣難以質大庭復無以對天帝自是由欺而肆妄而踰蕩有莫究其極者矣惟將此敬字納之於宥密靜則如見大賓動則如承大祭以私居爲目視手指之地以獨處爲帝臨神鑒之時則持之懍然矢之肅然而齋莊中正自有莫之爲而爲莫之致而至者也夫有諸内者必形諸外由是正衣冠尊瞻視謹笑言愼動履無一事不敬無一時不敬極之造次於是顚沛於是是敬之約於一己者悉守身成己之學敬之推於人物者有德盛化神之能蓋不特敬以養其中和亦且敬以充其忠恕聖賢主一功夫此爲切實而後學麤浮少講心法是所期於謹篤之士示鄧子三這箇氣字能橫四海塞天地發於無形充於有用自夫人血性一偏而氣爲其所役吾見氣有外剛而内實柔者有外伸而内實屈者有外强而内實餒者蓋直養之功未深故浩然之體不著耳惟以義帥氣義正而氣自强以道範氣道在而氣自足義與道所當爲氣不嫌於激烈義與道所不爲氣不妨於斂藏不任氣不縱氣不動氣不暴氣氣爲理所升降不爲我所消長也能柔和始能剛大能屈抑始能常伸然後靜則憂患恐懼之不生動則麤疏暴厲之不作人惟見我之有義惟見我之有道而不見我之有氣也此養氣之功所以與知言並重歟示陶子復宋湻熙中有志士聶某者居東海聞西域有佛能度生死乃擔囊徒步往訪之僉曰途遠甚子何必爾聶若弗聞也者而竟往行數月途人知其意者又曰遠甚子何必爾聶若弗聞也者而仍往又數月途人知其意者更曰遠甚子何必爾聶則厭聞而揜耳仍前往途中日暴雨淋艱苦已極行數載始得見佛佛曰子堅志如此佛可成矣然則人之立志果如聶之不變不移何患無可成之事業哉不特此也愚公志欲移山精衞志切塡海人其傚之示胡子恕書曰謙受益易曰謙亨君子有終謙之爲言歉也此心常若歉然不自滿假故能受益故能有終蓋謙以持已則有餘不敢盡謙以接物則不欲多上人人生學問德業皆從謙字造到富貴福澤皆從謙字得來所以子房不以進履爲恥廉頗不以負荆爲羞示興旭從理則安從欲則危蓋理者合天道順人情推之百爲而皆當故曰安欲者害心志賊善良極之百念而皆私故曰危欲去危以就安須窒欲而循理孔子曰君子坦蕩蕩小人長戚戚一理一欲從心體上描畫出來人可不鑒於小人而勉附於君子之列耶示呂子興情者大同理者一致固未可任意是非者也士人逞聰明矜才幹每每俯視一切處己處人多所執抝有出乎情理之外者不知古今祗此一情祗此一理凡事當揣情度理情理於我去得始於人去得若我先不順情合理公道已失人心難安不可不自爲審量也後此出身加民情理二字更不可忽稍涉違悖獄成誣枉尤不可不愼也昔魯人曾參殺人有報於曾母曰曾參殺人曾母曰吾子必不殺人繼又有告於曾母曰曾參殺人曾母曰吾子必不殺人蓋亦準之以情斷之以理故知曾參之不殺人也觀此則處世亦烏可無揆情辨理之學耶示饒子貞世俗於父母生日多集賓朋烹調宰割爲父母夀不知雞豚魚鼈亦解貪生爲親生而戕物生生理先滅於親有礙惟於是日多買物命放之淵藪多買字紙焚之鼎爐方是夀親之道再能存好心行好事說好話爲好人無一善不爲父母而作無一功不爲父母而立則不待稱觴頌祝而父母之遐齡自增卽異日考終亦登極樂示蔡子錫佛家空五藴除四賊所以明心見性使無受想行識故破迷途一切之礙今人受想行識都爲塵緣而起愈貪戀則愈苦惱其中之得而復失喜而復憂無止境矣嗚呼朱顏曾幾日鬚髮忽蒼蒼安舒之態少徵折磨之苦時逼誠可嘆也惟能空諸一切卽有纒愛力持慧劍以斷之庶一日可得半日之靜修矣卽生活之計在所不免而得半則止少卻了許多勞碌以此修行方能有濟蓋一心不亂可步佛仙非妄談也示吳子林父作室欲其子之肯構肯堂厥父菑欲其子之肯播肯穫人貴爲克家之令子尤貴爲繼述之孝子否則大傷厥考之心昔堯舜之子不肖其不肖處在不能承父志非大不類者比也人若父在無志可觀父没無行可述則不但自多愧怍人將呼而責之矣示遠近小子輩微員末秩亦邀一命之榮必如分盡職方是小臣忠悃當日孔子爲委吏則曰會計當而已爲乘田則曰牛羊茁壯長而已此卽盡職處若祗出則誇餙輿馬入則呼令僕從而應盡之職并無奏效淸夜思維殊多抱愧示吕子皐昔有王樸陰隲人也其子曰敏曰敬曰孜樸卒敏與敬各爭其業及器用什物惟孜一無所取其鄰曰子何弗取其半孜曰吾受父之福田多矣種之不盡食之無窮尙何復有所爭取乎後孜謹繼父志廣積陰功終其身亦不見窘然則人幸有修德樂善之父爲我子孫綿世澤於無盡較之以金銀遺我者其食利更多多矣豈可因家無遺貲而遂忘我父之陰有所遺哉示正理人生利益身心得於師者半得於友者亦半蓋友者所以規過勸善也然必自我擇之益者是友損者勿友始獲身心之助否則於我身心如冰炭然矣孔子曰商也日益賜也日損蓋商好與賢己者處賜好與不勝己者居也示曾子吾高子所志者大見非管窺固是超羣邁俗之士然荏苒年華逝如流水亦須及時努力不可徒托空懷若因循時日阻卻前修則有志未伸終與無志者等甚可惜也示南邑高子福良者繫本然之善一切忠孝廉節仁義禮智皆從此良字發出一人能充發其良人人能充發其良世自無悖逆僞妄之事一人牿亡其良人人牿亡其良世每多乖僻姦宄之徒試問人生由少而壯而老充發者幾多人牿亡者又幾多人以數較之天下約有恆河沙數人卽約有恆河沙數不良其良者始焉性善未漓無不知愛其親無不知敬其長及知識漸開嗜欲一起遂將天命之眞日剝月削澌滅殆盡而不忠不孝不仁不義有敢於爲而不顧者矣有寡廉鮮節背禮違道甘於蹈而不惜者矣然人縱不解聖賢存理遏欲葆養天良而羞惡尚未盡汩没也惻忍尙時發見也推之是非恭敬尙日月而一生也當斯時也有人提醒之曰羞惡惻忍是非恭敬是卽固有之良不待外求而自得者也則觸動其良自能復還其良自能擴充其良使人人觸動其良復還其良擴充其良念念在天理事事根性眞幽獨無愧怍之情衾影無慙恧之態啟其性善復其生初不卽在此哉又如童子入塾以孝親敬長謹信親愛處處引到良字上又以不踐蟻蟲卽是惻忍不貪外物卽是羞惡不涉放肆卽是恭敬不說誑話卽是是非等類明顯道破使之日習月熟則不學而知不學而能之本性自不至昏闇而不明而一生之成其爲人實自此始矣是在善於訓人者示邱子門人生爲此利字敗壞許多英賢豪傑折散許多富貴功名深可嘆惜子能除去利心專一向善發堅固念存長久心猛勇精進直竟善途把這良心更要保護得𦂳良字從艮艮止也止其所而不動搖也良字從退謙退而不敢自高也起初養這箇良還有止息至觸景觸物良皆發於不自知動於不自覺則眞良不昧而天理亦因之流行不息矣吾說偈曰良是立身基昧卻卽滅理保護如嬰兒天心方見許此持心之總要也心旣定矣品斯宜講友不得人品不能端夤緣勢利附和輕佻品不能端言語涉於肆妄衣履涉於豔薄品不能端品者如玉之不使玷如蓮之不使污不玷不污品乃立矣如此方是家之肖子國之端人仙佛門中之根蒂至於警惕功夫又必自功過格始有功記功有過登過悚然有畏天地神明之意惕然有懼父母師保之心漸而熟焉卽聖門之守敬存誠佛法之眞一不二道家之養心煉性也聽吾偈言幽居暗室不可欺去惡如鋤草莫遲從前今日過齊補天禍人災自遠離作善功所以種果也作陰功更有益於本身後嗣如扶持老幼孤貧買放飛禽魚鼈等類行一次較他善利益五倍爾於此極宜踴躍遵行以補先人之殃咎以延爾宗之嗣續且主生福德男女又何憂家口之不熾盛哉至於遇路修路遇橋培橋諸好事時時爲之亦如東園之種瓜得瓜西圃之植麻得麻也說畢再偈人生切莫性游移一條大道任所之荆棘叢中花柳岸錯下一足悔已遲示段子昌自古聖賢仙佛一而二二而一者也然吾語錄中不言仙佛第言聖賢者何哉誠以世間無不忠不孝不仁不義之仙佛亦猶世間無不忠不孝不仁不義之聖賢也旦使人能德行無虧倫常無忝則今日可爲乾坤之肖子天地之完人卽異日可爲洞中之仙子蓮座之菩薩矣况夫儒家之無聲無臭卽道家之常淸常靜也儒家之不覩不聞卽釋家之非空非色也儒家之曰精曰一曰忠曰恕卽道釋家之曰玄曰妙曰慈曰悲也推之克己復禮何莫非取坎塡離之功盡性踐形何莫非煉己築基之事私欲淨盡天理流行何莫非一念規中萬緣息盡之景象鳶飛魚躍川流敦化何莫非三花聚頂五氣朝元之神情人祗要自問可以爲聖爲賢則無不可以成仙成佛又何必舍其易而求其難哉念及此則謂吾語錄爲聖賢之功用可也卽謂爲仙佛之階梯亦無不可東園雜詠附五言絶㵎漲萬山新雨後飛泉壁有聲笑無利濟者一㵎斷人行聞書聲夏木濃如許山川入眼淸鶴車臨此地鄰舍有書聲示道大道有眞際天地常自然若問修行法靜裏覓丹田再臨萬夀山水送行程風聲又雨聲欲閒閒不得重到諭諸生暮春東皇何草草催減好芳辰任隨鶯燕語無計可留春秋夜行北斗橫天遠新秋一味涼出山人寂寂露滴荳花香卽景涼月滿四更蟋蟀鬬花棚道人肩未息秋露濕衣襟十月二十八日陰從陽盡生陽至陰凝結東來大地春先問梅消息五言古言志偶詠仔肩不自息踏遍草離離道遇狂歌者笑我不知時世道已如此忙忙欲何之吾聞此子語捫懷獨自悲不治急欲治殷勤有所施周流乾坤内草草勞其思吾果何爲者運會欲轉移斯民皆直道可拯不遲遲吾心心天地將與古人期語陶子復七月未逢君君仍處困苦人或爲君憐我願君力努飽德味常腴精藴充仁圃勤修得其華富貴何足數聞道於一朝榮名自千古五言律初夏翩翩乘鶴去好是月淸和村中烟護水山外樹交柯蟬聲新抱葉雲影淡臨波行行多得意無地不樵歌夾竹桃因供此花動我愛慕之情更欲多植以備玩賞不禁發於言詞東園與西圃多栽夾竹桃宜春亦宜夏憐雅更憐嬌偶來五陵興時與七賢遭臨風微帶笑相對樂陶陶贈樂子有序樂子正國工丹靑筆亦高雅前載繪靈異事蹟圖數十幅殊少俗墨今復繪東園圖以進己附梓冠諸語錄首矣因贈以言妙景殊難得披圖一望收濃摹三月雨淡點一江秋隱約遙峰寺分明近水樓梅花千樹雪不待幾生修九日重登君山君山不似舊登臨感慨多秋風催木葉氛氣滿湖波醉酒傷時事調琴咏斧柯天心搔首問何日太平歌平雲堂夜月明月懸夜光皎皎照西堂松枝垂壁重花影入簾香酌酒娛今夕焚檀答上蒼更闌人寂寂閒步小廻廊蜀莊卜肆小隱非眞隱全操是蜀莊垂簾雜都市賣卜寓行藏字字推忠孝言言决否臧先生甘混俗心事共名芳有求書者大筆誰扛得神來寫硬黃風流參漢晉體勢別鍾王興起龍蛇走書成翰墨香幾行須鄭重壁漫補東廂時雨久旱苗將稿農夫望禱深偶看雲密密遂沛雨淋淋帝澤時剛待神功感不禁田間溝與澮頃集慶甘霖七言絶臨萬夀朝罷歸來淚暗傾蒼生赤子總關情幾回欲向人間說無奈人間說不淸飮酒麥秋天氣頗淸和竟日羣仙滿座歌放量飽吞三百斗餘杭十貫未嫌多示道踏倒葫蘆醉未醒乾坤之外一閒身有人問我修眞法外葆肌膚内葆神示童子如金如玉是讀書不讀詩書學已疏若問功夫何自起功夫端的問三餘賜諸生酒臨壇特賜三杯酒成禮合歡兩得之好是一堂敦肅穆老仙暢快冩新詩再飮三廵酒倍香仙凡何至隔雲鄉此宵高會眞難得我且歌來索和章三廵之後更三廵興愈酣時酒愈醕滋味不於杯中得分來秋夜滿天春詠雞冠黃菊二種喔喔東籬秋倍長好同晚節傲寒霜相鄰相對無相識一抱丹心一抱黃立冬小雨微寒立冬天家家投炭火新圓乾坤剝復無停滯葭管灰飛妙自然鳳尾松別有龍鱗別有心鳳毛豐滿出遙岑想是山中鳴和少飛來伴我住庭陰卽景靈龍妙鶴導前程越遍雲山雁有聲直到平原添野趣黃花滿路襯人行自題日影三竿我尚眠流鶯不住喚谿邊起來點得黃金用不用人間臭氣錢誕日自慶王家樓上許家樓乘興高歌疊唱酬更與主人賡一曲笛聲吹處水山悠座中佛手柑滿筵花果品皆珍中有拳拳一物新若演西方佛子法也將十指屈而伸下山遊春風無限吹煩惱教人何事情意好呼童攜酒下山遊鐵笛一聲雲澹掃牡丹胭脂雖買畫難工濃澹相兼一捻紅縱有桃花飛點點不如醉臉笑春風宣講有效日月光天節序和江城秋滿稼盈坡欲知蜀國年豐稔宣講功彌蜀國多有感百物凋殘太莫情森森松柏度千生不是𡻕寒人不識幾教埋没好材成興來索飮小屋清幽似野航座中佳釀送風香道人願醉不甘醒換卻小觴酌大觴試鐘洪鐘幾日鑄已成澈地通天自有憑欲把塵心重洗滌性和爲我叩三聲過火災處因題此以示警烈火騰騰莫浪驚還從淸夜問生平只因錯把心機用不義家藏一旦傾秋菊牡丹芙蓉三種偶來菊圃采籬東抱得丹心帶露濃獨把一樽重自酌酒痕己上玉芙蓉送葉子護靈偶趁微風下益州香雲薄霧小勾留慈舟渡得無生法一路輕帆到岸頭讀歸去來詞先生歸去愛吾盧趁此時還便讀書充詘不形殊自得風淸月白有誰如賞海棠幾度春風帶雨來翩翩鶴駕到壇台香國海棠眞足羡名花一樹酒千杯臨萬夀鶴駕排空下帝鄉盈盈䖍爇一爐香紅塵莫怪神仙戀卻爲愚迷晝夜忙卽景連番小雨過山家宿酒醒時興欲奢春色滿園看不盡紅桃花間白桃花賜諸子飮一爵通腸膽氣淸也安神志也生精今宵宴樂歡無極月在天心漏五更二爵香浮氣倍蒸飮之可當海籌增諸生試問人生樂曾否如斯得岸登禮成三爵飮興多狼藉杯盤乏高歌諸子爲吾賡一曲笛譜雲天月在波自題木筆一枝妙入神愚盲喚醒字皆珍道人發下宏深願不薄今人愛古人贈左靖虛靖虛靖虛備淸才冷冷風送撲鼻梅當日何韓年少得聖胎結就脫凡胎語劉子達中匏官抛卻賦歸鄉回首湘江路𣺌茫欲覔大丹無外務斂神就範問黃房示劉朝勳活人活已兩相安天意人心一樣看他日功成歸去也雲山一笛過層巒賞夾竹桃海棠蕙三種片片桃花寄竹枝海棠爭艷襯丰姿惟有蕙香偏撲鼻移來一處惹新詩示楊學仁刻刻防心心卻離不如拴鎖莫任馳與君一箇收心法裝作呆來裝作癡示吳子林修心只是問丹田莫舍丹田另覓玄氣自斂兮神自定何須徒襲口頭禪七言古飮後狂吟道人好酒不好醉欲醉不醉終日睡醒時重酌幾百杯月朗星輝照天地再酌幾杯歌復狂興闌落筆成詩句問我吟情果若何吟情趣在杯中趣遊霧山霧山高兮高出天中有雲氣盤岩顚四望古木少人煙千峯萬壑聳如肩我尋古蹟踏蒼蘚苔侵磴滑葛蘿牽不聞鳥語喚天邊但聞深㵎水潺潺龍蛇虎豹羣相連硫磺氣熏鼻腥羶木石倒崩當路前天日長陰變坤乾欲出山兮霧廻旋罕干大有鐘聲隔嶺傳此間信多住世仙爲登古寺密林穿古寺大唐開法筵山僧傍午共參禪我問山僧僧便便自昔罹災一炬然瓊宫貝闕餘數椽紛紛瓦礫碎花磚遺址空餘覆鹿眠有池無有出山泉只餘明月照淸漣山中有明月池危樑幾榻碣石懸流月月流今古圓山中有流月橋道塲千載迭變遷試掃苔痕覓遺編一碑未徧滅古仙人已去我無緣雲霧浮空滿大千霧出盪胸俗慮蠲霧散羣山入眼全霧出霧散幾千年我乘白霧上太玄燕子行春日晴和來新燕飛入人家斜目眄穿簾入闥繞梁間若與主人初覿面絮語商量覓春巢相厥攸居樂陶陶去年舊居嫌不固爲卜新居語嘈嘈擇得庭軒心歡喜不待雞鳴便欲起鄉村帶雨啄香泥對對飜飛情難已費盡辛苦巢始成窩中靜處無陰晴忍饑耐渴長如此廹欲新雛脫殻生生雛啣食不少停冐雨經風遍野尋得食歸來哺燕子賢哉懇懇與懃懃何期毛羽剛豐滿飛去他家竟不返可憐終日語雕梁痛斷肝腸傷破胆廻憶乳哺費精神至今孑然獨一身鬻子之恩誰報得空勞心力度三春吁嗟乎負恩不獨一燕子觀燕令我愁腸起人子不報父母恩天賦眞良業己死人生盡孝當及時膝下依依莫遠離庭闈無恙早供職終天抱憾已遲遲七言律平雲堂題壁兼語陶子復偶穿竹徑到平雲境地淸幽自不羣門對雙谿浮鴨爪庭餘老柏起龍紋開軒几凈如相對入座爐香卻早聞我羡主人眞不俗盈盈盞酒奉殷勤其二彷彿匡山離垢園經年絶少馬車喧靜中日月長如歲閒裏功夫默守元不住流鶯嗁遠樹無端飛燕語東軒此間坐卧殊無累急把玄機仔細參其三堂前百卉共芬芳次第花開壓短牆台砌蝶穿身似夢欄杆人倚氣偏香午書課罷聲方歇卯酒醒餘意若忘更有一番鄉野趣蟬鳴不斷到斜陽其四平雲居士品高淸秀骨珊珊質玉璜旣識塵緣歸幻象須從現世悟無生垂簾靜息添眞液塞兌深藏養至精自古仙源皆可問莫教歧向阻前程懷范子涵故人相別幾經年聞說修持志力專立德立言無懈怠希仙希佛有因緣能於窮族垂靑眼信是淤泥長白蓮眾濁獨淸眞箇少聖賢心事羡君肩寄范子涵說到人心奈若何無端平地起風波家無賢孝思光祖世夥姦頑敢犯科惟道貨財萬分少若陳果報半言多澆漓似此難爲挽不識君心憾也麽寄鍾子本本生別去隔山河屈指於今八載過定擬修持與歲進豈肯身心曠日多人當老去功宜補家縱貧時志不磨回憶半生成夢幻餘暉足惜莫嗟跎贈盧子虛髯翁八十多精神噉飯猶强老夀徵方寸恐荒常樹德一生立志不言貧爲山土簣時時進修己功夫日日新耄矣猶勤誰得似迎人處更藹如春示徐子直萬刼千生到此生此生𡻕月莫虛更少年恍惚時多廢半世修爲事匪輕隨地立功惟努力臨財辨義自懷淸鏡花水月都成幻曷把人心仔細評戒蕭子湘火發無明熾性根莫教熖熖上天門和平養得春風普煩惱除將樂意存觀我觀人殊一致疾時疾俗可無言若逢酒戰休爭勝葆定靈珠固本原示胡子恕妙合三才是此身性中無僞有天眞只緣後起私慾勝遂使先天至善淪滴滴還原歸本相茫茫迷路喪元神年華荏苒時難再趁早修行做箇人喜趙子仁直道婆心兩得之通天質地意無私惟將禮法律人已總以箴規望友師一點靈明渣早净多生因果話非癡從兹積累功無輟信有祥雲捧日時
